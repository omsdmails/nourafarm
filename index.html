<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار المزرعة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1e3c2c; font-family: system-ui; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #app { max-width: 500px; width: 100%; background: #2e4a2e; border-radius: 30px; padding: 20px; color: white; }
        button, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: none; }
        button { background: #ffcf4a; font-weight: bold; cursor: pointer; }
        .card { background: #1f3b1a; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .error { background: #8b3a3a; padding: 10px; border-radius: 20px; text-align: center; }
        .success { background: #2a6b2a; padding: 10px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        // بيانات Supabase الخاصة بك
        const SUPABASE_URL = 'https://kzheikbpxicoeohapfjb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_aVm9aZ6W5vYTVvTxo3hucw__uZ06aId';
        
        // التحقق من تحميل المكتبة
        if (typeof window.supabase === 'undefined') {
            document.getElementById('app').innerHTML = '<div class="card"><div class="error">❌ مكتبة Supabase لم تحمل. تأكد من اتصال الإنترنت.</div></div>';
        } else {
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // عرض شاشة تسجيل الدخول مباشرة (بدون انتظار getUser)
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <h2>🌾 المزرعة المشتركة</h2>
                    <input type="email" id="email" placeholder="البريد الإلكتروني" value="test@example.com">
                    <input type="password" id="password" placeholder="كلمة المرور" value="12345678">
                    <button id="signupBtn">📝 إنشاء حساب جديد</button>
                    <button id="loginBtn">🔓 تسجيل دخول</button>
                    <div id="msg"></div>
                </div>
            `;
            
            document.getElementById('signupBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                const resultDiv = document.getElementById('msg');
                resultDiv.innerHTML = '<div class="success">⏳ جاري التسجيل...</div>';
                const { error } = await supabase.auth.signUp({ email, password: pass });
                if (error) {
                    resultDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
                } else {
                    resultDiv.innerHTML = '<div class="success">✅ تم التسجيل! تأكد من بريدك الإلكتروني (رابط التأكيد) ثم سجل الدخول.</div>';
                }
            };
            
            document.getElementById('loginBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                const resultDiv = document.getElementById('msg');
                resultDiv.innerHTML = '<div class="success">⏳ جاري الدخول...</div>';
                const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
                if (error) {
                    resultDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
                } else {
                    resultDiv.innerHTML = '<div class="success">✅ تم الدخول بنجاح! جاري تحميل اللعبة...</div>';
                    // عرض شاشة بسيطة بعد الدخول
                    setTimeout(() => {
                        document.getElementById('app').innerHTML = `
                            <div class="card">
                                <div class="flex" style="display:flex; justify-content:space-between;">
                                    <span>💰 100 ذهب</span>
                                    <span>👤 ${email}</span>
                                    <button id="logoutBtn" style="width:auto;">🚪 خروج</button>
                                </div>
                                <hr>
                                <div>
                                    <h3>🌾 مزرعتك</h3>
                                    <button id="plantBtn" style="background:#7c5e3a;">زراعة قمح (2 ذهب)</button>
                                    <button id="harvestBtn" style="background:#e9b35f;">حصاد (يظهر بعد 5 ثوانٍ)</button>
                                </div>
                                <hr>
                                <div id="marketArea">
                                    <h3>🛒 السوق المشترك</h3>
                                    <p>جاري تحميل السوق...</p>
                                </div>
                                <div id="msg2"></div>
                            </div>
                        `;
                        
                        let gold = 100;
                        let field = null;
                        
                        async function updateMarket() {
                            const { data: listings } = await supabase.from('market_listings').select('*, seller:profiles(username)').eq('status', 'active');
                            let marketHtml = '';
                            if (listings && listings.length > 0) {
                                for (let l of listings) {
                                    marketHtml += `<div style="background:#2c5e2a; margin:8px 0; padding:10px; border-radius:15px;">${l.item_name} x${l.quantity} - 💰${l.price_per_unit} - 👤${l.seller?.username}</div>`;
                                }
                            } else {
                                marketHtml = '<p>لا توجد إعلانات</p>';
                            }
                            document.getElementById('marketArea').innerHTML = `<h3>🛒 السوق المشترك</h3>${marketHtml}`;
                        }
                        updateMarket();
                        
                        document.getElementById('plantBtn').onclick = () => {
                            if (field) { alert('الحقل مشغول!'); return; }
                            if (gold < 2) { alert('لا تملك 2 ذهب'); return; }
                            gold -= 2;
                            field = { plantedAt: Date.now() };
                            document.querySelector('.flex span:first-child').innerHTML = `💰 ${gold} ذهب`;
                            alert('زرعت قمحاً! سينضج بعد 5 ثوانٍ');
                            setTimeout(() => { alert('القمح نضج! اضغط حصاد'); }, 5000);
                        };
                        
                        document.getElementById('harvestBtn').onclick = () => {
                            if (!field) { alert('لا يوجد محصول في الحقل'); return; }
                            if ((Date.now() - field.plantedAt) / 1000 < 5) { alert('لم ينضج بعد'); return; }
                            gold += 5;
                            field = null;
                            document.querySelector('.flex span:first-child').innerHTML = `💰 ${gold} ذهب`;
                            alert('حصّدت قمحاً! +5 ذهب');
                        };
                        
                        document.getElementById('logoutBtn').onclick = () => { supabase.auth.signOut(); location.reload(); };
                    }, 1000);
                }
            };
        }
    </script>
</body>
</html>
