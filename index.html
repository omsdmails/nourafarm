<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المزرعة - تسجيل الدخول</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1e3c2c; font-family: Arial; display: flex; justify-content: center; padding: 20px; }
        .card { background: #2e4a2e; padding: 20px; border-radius: 20px; color: white; max-width: 400px; }
        button, input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 20px; border: none; }
        button { background: #ffcf4a; cursor: pointer; font-weight: bold; }
        .error { color: #ffaaaa; background: #6d2e2e; padding: 10px; border-radius: 10px; }
        .success { color: #aaffaa; background: #2a5a2a; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        const SUPABASE_URL = 'https://kzheikbpxicoeohapfjb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_aVm9aZ6W5vYTVvTxo3hucw__uZ06aId';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function load() {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                document.getElementById('app').innerHTML = `
                    <div class="card">
                        <h2>🌾 مرحباً ${user.email}</h2>
                        <button onclick="logout()">تسجيل خروج</button>
                    </div>
                `;
            } else {
                document.getElementById('app').innerHTML = `
                    <div class="card">
                        <h2>🌾 المزرعة</h2>
                        <input type="email" id="email" placeholder="البريد الإلكتروني">
                        <input type="password" id="password" placeholder="كلمة المرور">
                        <button onclick="signup()">حساب جديد</button>
                        <button onclick="login()">دخول</button>
                        <div id="msg"></div>
                    </div>
                `;
            }
        }
        
        window.signup = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const { error } = await supabase.auth.signUp({ email, password: pass });
            const msg = document.getElementById('msg');
            if (error) msg.innerHTML = `<div class="error">${error.message}</div>`;
            else msg.innerHTML = '<div class="success">✅ تم التسجيل! افتح بريدك للتأكيد ثم سجل الدخول</div>';
        };
        
        window.login = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) document.getElementById('msg').innerHTML = `<div class="error">${error.message}</div>`;
            else location.reload();
        };
        
        window.logout = async () => {
            await supabase.auth.signOut();
            location.reload();
        };
        
        load();
    </script>
</body>
</html>
