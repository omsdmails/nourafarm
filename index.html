<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>المزرعة</title>
    <style>
        body { background: #1e3c2c; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #2e4a2e; padding: 30px; border-radius: 20px; color: white; text-align: center; }
        button { background: #ffcf4a; padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; font-size: 16px; margin: 5px; }
        input { padding: 10px; margin: 5px; border-radius: 20px; border: none; width: 90%; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        // عرض شاشة بسيطة بدون Supabase أولاً
        document.getElementById('app').innerHTML = `
            <div class="box">
                <h1>🌾 المزرعة</h1>
                <p>إذا رأيت هذا النص، فالمشكلة ليست في الكود</p>
                <button onclick="alert('الزر يعمل!')">اضغط هنا للاختبار</button>
            </div>
        `;
    </script>
</body>
</html>
