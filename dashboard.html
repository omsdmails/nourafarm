<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لوحة الألعاب - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .dashboard {
            max-width: 700px;
            width: 100%;
            background: #2e4a2e;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            color: white;
        }
        h1 { color: #ffcf4a; margin-bottom: 10px; }
        .subtitle { color: #c5e0b4; margin-bottom: 30px; }
        .games-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .game-card {
            background: #1f3b1a;
            border-radius: 30px;
            padding: 25px;
            width: 180px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid #ffcf4a;
        }
        .game-card:hover { transform: scale(1.02); background: #2c5e2a; }
        .game-card .emoji { font-size: 60px; display: block; margin-bottom: 10px; }
        .game-card h3 { font-size: 22px; margin-bottom: 5px; }
        .game-card p { font-size: 13px; color: #c5e0b4; }
        .logout-btn {
            background: #8b5a2b;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .user-info {
            background: #1f3b1a;
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        hr { border-color: #4f7840; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="dashboard" id="app">
        <h1>🎮 منصة الألعاب</h1>
        <div class="subtitle">اختر لعبتك المفضلة</div>
        <div class="user-info" id="userInfo"></div>
        <div class="games-grid">
            <div class="game-card" onclick="window.location.href='location.html'">
    <div class="emoji">📍</div>
    <h3>تحديد موقعي</h3>
    <p>لتوزيع عادل للنقل</p>
</div>
            <div class="game-card" onclick="window.location.href='farm.html'">
                <div class="emoji">🌾</div>
                <h3>المزرعة</h3>
                <p>زراعة وحصاد وتربية حيوانات</p>
            </div>
            <div class="game-card" onclick="window.location.href='market.html'">
                <div class="emoji">🛒</div>
                <h3>السوق المشترك</h3>
                <p>بيع وشراء مع لاعبين آخرين</p>
            </div>
            <div class="game-card" onclick="window.location.href='restaurant.html'">
                <div class="emoji">🍽️</div>
                <h3>المطعم</h3>
                <p>طهي وجبات وبيعها بربح أعلى</p>
            </div>
        </div>
        <button class="logout-btn" id="logoutBtn">🚪 تسجيل خروج</button>
    </div>
    <script>
        function loadSession() {
            const saved = localStorage.getItem('farmSession');
            if (!saved) { window.location.href = 'index.html'; return null; }
            try {
                const data = JSON.parse(saved);
                if (Date.now() - data.loginTime > 86400000) {
                    localStorage.removeItem('farmSession');
                    window.location.href = 'index.html';
                    return null;
                }
                return data;
            } catch(e) { window.location.href = 'index.html'; return null; }
        }
        const session = loadSession();
        if (session) {
            document.getElementById('userInfo').innerHTML = `
                <span>👤 ${session.username}</span>
                <span>🆔 ${session.isGuest ? 'زائر' : 'مسجل'}</span>
                <button id="refreshBtn" style="background:#3b5e2b; padding:5px 12px;">🔄 تحديث</button>
            `;
            document.getElementById('refreshBtn').onclick = () => location.reload();
        }
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('farmSession');
            window.location.href = 'index.html';
        };
    </script>
    <div class="game-card" onclick="window.location.href='factory.html'">
    <div class="emoji">🏭</div>
    <h3>المصنع</h3>
    <p>تحويل المواد الخام</p>
</div>
    <div class="game-card" onclick="window.location.href='map.html'">
    <div class="emoji">🗺️</div>
    <h3>محطات الخدمة</h3>
    <p>وقود، غسيل، صيانة</p>
</div>
</body>
</html>
