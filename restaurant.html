<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المطعم - المزرعة الكبرى</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .restaurant-container { max-width: 650px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .nav-btn.active { background: #ffcf4a; color: #1f3b1a; }
        .content { padding: 20px; }
        .recipe-card { background: #1f3b1a; border-radius: 20px; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .recipe-card button { background: #ffcf4a; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .recipe-card button:disabled { background: #6d6d6d; cursor: not-allowed; opacity: 0.6; }
        .ingredients { font-size: 13px; color: #c5e0b4; }
        .inventory-list { background: #1f3b1a; border-radius: 20px; padding: 15px; margin-top: 20px; }
        .inventory-item { background: #3b5e2b; border-radius: 30px; padding: 5px 12px; display: inline-block; margin: 4px; font-size: 13px; }
        hr { border-color: #4f7840; margin: 15px 0; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .logout-btn { background: #8b5a2b; color: white; }
        h2, h3 { margin-bottom: 10px; border-right: 4px solid #ffcf4a; padding-right: 10px; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        // قائمة الوصفات (المنتج النهائي، المكونات، سعر البيع)
        const RECIPES = {
            "خبز قمح": {
                emoji: "🍞",
                ingredients: { "Wheat": 2 },
                sellPrice: 12,
                desc: "خبز طازج من القمح"
            },
            "سلطة طماطم": {
                emoji: "🥗",
                ingredients: { "Tomato": 2, "Carrot": 1 },
                sellPrice: 18,
                desc: "سلطة صحية بالطماطم والجزر"
            },
            "بطاطا مقلية": {
                emoji: "🍟",
                ingredients: { "Potato": 3 },
                sellPrice: 15,
                desc: "بطاطا ذهبية مقرمشة"
            },
            "صلصة الفلفل": {
                emoji: "🌶️",
                ingredients: { "Pepper": 2, "Tomato": 1 },
                sellPrice: 22,
                desc: "صلصة حارة لذيذة"
            },
            "عجة البيض": {
                emoji: "🍳",
                ingredients: { "Egg": 2 },
                sellPrice: 10,
                desc: "عجة بيض شهية"
            },
            "حليب بالشوكولاتة": {
                emoji: "🥛",
                ingredients: { "Milk": 1, "Strawberry": 1 },
                sellPrice: 14,
                desc: "حليب بنكهة الفراولة"
            },
            "فطيرة التفاح": {
                emoji: "🥧",
                ingredients: { "Wheat": 3, "Strawberry": 2 },
                sellPrice: 28,
                desc: "فطيرة حلوة لذيذة"
            },
            "عصير بطيخ": {
                emoji: "🧃",
                ingredients: { "Watermelon": 1 },
                sellPrice: 18,
                desc: "عصير طبيعي منعش"
            }
        };

        let session = null;
        let player = null;

        function loadSession() {
            const saved = localStorage.getItem('farmSession');
            if (!saved) {
                window.location.href = 'index.html';
                return null;
            }
            try {
                const data = JSON.parse(saved);
                if (Date.now() - data.loginTime > 86400000) {
                    localStorage.removeItem('farmSession');
                    window.location.href = 'index.html';
                    return null;
                }
                return data;
            } catch(e) {
                window.location.href = 'index.html';
                return null;
            }
        }

        function loadGame() {
            const saved = localStorage.getItem('farmGame_' + session.userId);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    player = data;
                    if (!player.inventory) player.inventory = {};
                    if (!player.gold) player.gold = 100;
                    if (!player.score) player.score = 0;
                } catch(e) {}
            }
            if (!player) {
                player = { gold: 100, score: 0, inventory: { Wheat: 3, Carrot: 2 }, fields: [], animals: [] };
            }
        }

        function saveGame() {
            const gameData = {
                gold: player.gold,
                score: player.score,
                fields: player.fields || [],
                animals: player.animals || [],
                inventory: player.inventory
            };
            localStorage.setItem('farmGame_' + session.userId, JSON.stringify(gameData));
        }

        function showMessage(msg, isError = false) {
            const msgDiv = document.getElementById('message');
            if (msgDiv) {
                msgDiv.innerHTML = msg;
                msgDiv.className = isError ? 'message error-message' : 'message';
                msgDiv.style.display = 'block';
                setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
            }
        }

        // الطهي (استهلاك المكونات، إضافة الذهب والنقاط)
        function cook(recipeName) {
            const recipe = RECIPES[recipeName];
            if (!recipe) return;

            // التحقق من وجود المكونات
            for (let [ing, qty] of Object.entries(recipe.ingredients)) {
                if (!player.inventory[ing] || player.inventory[ing] < qty) {
                    showMessage(`⚠️ لا تملك ${qty} من ${ing}`, true);
                    return;
                }
            }

            // استهلاك المكونات
            for (let [ing, qty] of Object.entries(recipe.ingredients)) {
                player.inventory[ing] -= qty;
            }

            // إضافة الذهب والنقاط
            player.gold += recipe.sellPrice;
            player.score += 2;  // نقطتين لكل وجبة

            saveGame();
            renderRestaurant();
            showMessage(`🍳 تم طهي ${recipe.emoji} ${recipeName}! +${recipe.sellPrice} ذهب`);
        }

        function logout() {
            localStorage.removeItem('farmSession');
            window.location.href = 'index.html';
        }

        function renderRestaurant() {
            // عرض المخزون الحالي
            let inventoryHtml = '';
            for (let [item, qty] of Object.entries(player.inventory)) {
                if (qty > 0) {
                    inventoryHtml += `<span class="inventory-item">📦 ${item}: ${qty}</span>`;
                }
            }
            if (inventoryHtml === '') inventoryHtml = '<p>مخزنك فارغ، اذهب إلى المزرعة لجمع المحاصيل</p>';

            // عرض الوصفات
            let recipesHtml = '';
            for (let [name, recipe] of Object.entries(RECIPES)) {
                // عرض المكونات المطلوبة مع توفرها
                let ingredientsList = '';
                let canCook = true;
                for (let [ing, qty] of Object.entries(recipe.ingredients)) {
                    const available = player.inventory[ing] || 0;
                    const color = available >= qty ? '#aaf0a0' : '#ffaaaa';
                    ingredientsList += `<span style="color:${color}">${ing} (${available}/${qty})</span> `;
                    if (available < qty) canCook = false;
                }
                recipesHtml += `
                    <div class="recipe-card">
                        <div>
                            <div><strong>${recipe.emoji} ${name}</strong> - 💰 ${recipe.sellPrice} ذهب</div>
                            <div class="ingredients">📦 المكونات: ${ingredientsList}</div>
                            <div style="font-size:11px;">${recipe.desc}</div>
                        </div>
                        <button onclick="window.cook('${name}')" ${!canCook ? 'disabled' : ''}>🍳 طهي</button>
                    </div>
                `;
            }

            document.getElementById('app').innerHTML = `
                <div class="restaurant-container">
                    <div class="header">
                        <div class="gold">💰 ${player.gold} ذهب</div>
                        <div>⭐ ${player.score} نقطة</div>
                        <div class="nav-buttons">
                            <a href="farm.html" class="nav-btn">🌾 المزرعة</a>
                            <a href="market.html" class="nav-btn">🛒 السوق</a>
                            <button class="logout-btn" id="logoutBtn">🚪 خروج</button>
                        </div>
                    </div>
                    <div class="content">
                        <h2>🍽️ المطعم</h2>
                        <p>اطبخ وجبات لذيذة وبيعها بربح أعلى!</p>
                        <div id="recipesList">${recipesHtml}</div>
                        <hr>
                        <div class="inventory-list">
                            <h3>📦 مخزونك الحالي</h3>
                            ${inventoryHtml}
                        </div>
                        <div id="message" class="message"></div>
                    </div>
                </div>
            `;
            document.getElementById('logoutBtn').onclick = logout;
        }

        session = loadSession();
        if (session) {
            loadGame();
            renderRestaurant();
        }

        window.cook = cook;
    </script>
</body>
</html>
