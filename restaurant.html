<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المطعم - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .restaurant-container { max-width: 650px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .recipe-card { background: #1f3b1a; border-radius: 20px; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .recipe-card button { background: #ffcf4a; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .recipe-card button:disabled { background: #6d6d6d; cursor: not-allowed; opacity: 0.6; }
        .ingredients { font-size: 13px; color: #c5e0b4; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 5px; }
        .ingredient-badge { background: #3b5e2b; border-radius: 30px; padding: 4px 10px; display: inline-flex; align-items: center; gap: 8px; }
        .buy-from-market { background: #8b5a2b; color: white; padding: 2px 8px; border-radius: 30px; font-size: 11px; text-decoration: none; }
        .inventory-list { background: #1f3b1a; border-radius: 20px; padding: 15px; margin-top: 20px; }
        .inventory-item { background: #3b5e2b; border-radius: 30px; padding: 5px 12px; display: inline-block; margin: 4px; font-size: 13px; }
        hr { border-color: #4f7840; margin: 15px 0; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .error-message { background: #8b3a3a; }
        h2, h3 { margin-bottom: 10px; border-right: 4px solid #ffcf4a; padding-right: 10px; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        function formatMoney(fils){ return (fils/1000).toFixed(3)+' د.أ'; }
        const RECIPES = {
            "خبز قمح": { emoji: "🍞", ingredients: { "Wheat": 2 }, sellPrice: 12000, desc: "خبز طازج من القمح" },
            "سلطة طماطم": { emoji: "🥗", ingredients: { "Tomato": 2, "Carrot": 1 }, sellPrice: 18000, desc: "سلطة صحية بالطماطم والجزر" },
            "بطاطا مقلية": { emoji: "🍟", ingredients: { "Potato": 3 }, sellPrice: 15000, desc: "بطاطا ذهبية مقرمشة" },
            "صلصة الفلفل": { emoji: "🌶️", ingredients: { "Pepper": 2, "Tomato": 1 }, sellPrice: 22000, desc: "صلصة حارة لذيذة" },
            "عجة البيض": { emoji: "🍳", ingredients: { "Egg": 2 }, sellPrice: 10000, desc: "عجة بيض شهية" },
            "حليب بالفراولة": { emoji: "🥛", ingredients: { "Milk": 1, "Strawberry": 1 }, sellPrice: 14000, desc: "حليب بنكهة الفراولة" },
            "فطيرة الفراولة": { emoji: "🥧", ingredients: { "Wheat": 3, "Strawberry": 2 }, sellPrice: 28000, desc: "فطيرة حلوة لذيذة" },
            "عصير بطيخ": { emoji: "🧃", ingredients: { "Watermelon": 1 }, sellPrice: 18000, desc: "عصير طبيعي منعش" }
        };
        let session=null, player=null;
        function loadSession(){ const saved=localStorage.getItem('farmSession'); if(!saved){window.location.href='index.html';return null;} try{const data=JSON.parse(saved); if(Date.now()-data.loginTime>86400000){localStorage.removeItem('farmSession');window.location.href='index.html';return null;} return data;}catch(e){window.location.href='index.html';return null;} }
        function loadGame(){ const key=session.isGuest?'guestGame':'game_'+session.username; const saved=localStorage.getItem(key); if(saved){ player=JSON.parse(saved); if(!player.inventory) player.inventory={}; if(!player.gold) player.gold=0; } else player={ gold:0, inventory:{}, score:0, fields:[], animals:[] }; }
        function saveGame(){ const key=session.isGuest?'guestGame':'game_'+session.username; localStorage.setItem(key,JSON.stringify(player)); }
        function showMessage(msg,isError){ const msgDiv=document.getElementById('message'); msgDiv.innerHTML=msg; msgDiv.className=isError?'message error-message':'message'; msgDiv.style.display='block'; setTimeout(()=>{msgDiv.style.display='none';},3000); }
        function buyFromMarket(ingredient){ localStorage.setItem('market_focus_item',ingredient); window.location.href='market.html'; }
        function cook(recipeName){
            const recipe=RECIPES[recipeName];
            let missing=[];
            for(let [ing,qty] of Object.entries(recipe.ingredients)) if((player.inventory[ing]||0)<qty) missing.push(ing);
            if(missing.length>0){ showMessage(`⚠️ المكونات الناقصة: ${missing.join(', ')}. يمكنك شراؤها من السوق.`,true); return; }
            for(let [ing,qty] of Object.entries(recipe.ingredients)) player.inventory[ing]-=qty;
            player.gold+=recipe.sellPrice; player.score=(player.score||0)+2;
            saveGame(); renderRestaurant(); showMessage(`🍳 تم طهي ${recipe.emoji} ${recipeName}! +${formatMoney(recipe.sellPrice)}`);
        }
        function renderRestaurant(){
            let inventoryHtml=''; for(let [item,qty] of Object.entries(player.inventory)) if(qty>0) inventoryHtml+=`<span class="inventory-item">📦 ${item}: ${qty}</span>`;
            if(inventoryHtml==='') inventoryHtml='<p>مخزنك فارغ، يمكنك شراء المواد من السوق</p>';
            let recipesHtml='';
            for(let [name,recipe] of Object.entries(RECIPES)){
                let ingredientsHtml=''; let canCook=true;
                for(let [ing,qty] of Object.entries(recipe.ingredients)){
                    const available=player.inventory[ing]||0; const hasEnough=available>=qty;
                    if(!hasEnough) canCook=false;
                    ingredientsHtml+=`<div class="ingredient-badge">${ing} (${available}/${qty})${!hasEnough?` <a class="buy-from-market" href="#" onclick="event.preventDefault(); window.buyFromMarket('${ing}'); return false;">🛒 شراء</a>`:''}</div>`;
                }
                recipesHtml+=`<div class="recipe-card"><div><strong>${recipe.emoji} ${name}</strong> - 💰 ${formatMoney(recipe.sellPrice)}<div class="ingredients">${ingredientsHtml}</div><div style="font-size:11px;">${recipe.desc}</div></div><button onclick="window.cook('${name}')" ${!canCook?'disabled':''}>🍳 طهي</button></div>`;
            }
            document.getElementById('app').innerHTML=`<div class="restaurant-container"><div class="header"><div class="gold">💰 ${formatMoney(player.gold)}</div><div>⭐ ${player.score||0} نقطة</div><div class="nav-buttons"><button class="nav-btn" id="dashboardBtn">🏠 القائمة الرئيسية</button></div></div><div class="content"><h2>🍽️ المطعم</h2><p>اطبخ وجبات لذيذة وبيعها بربح أعلى!</p><div id="recipesList">${recipesHtml}</div><hr><div class="inventory-list"><h3>📦 مخزونك الحالي</h3>${inventoryHtml}</div><div id="message" class="message"></div></div></div>`;
            document.getElementById('dashboardBtn').onclick=()=>{ window.location.href='dashboard.html'; };
        }
        session=loadSession(); if(session){ loadGame(); renderRestaurant(); }
        window.cook=cook; window.buyFromMarket=buyFromMarket;
    </script>
</body>
</html>
