<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المتجر المركزي - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .store-container { max-width: 800px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .category-section { margin-bottom: 25px; }
        .category-title { background: #1f3b1a; padding: 8px 15px; border-radius: 30px; margin-bottom: 10px; font-size: 18px; border-right: 4px solid #ffcf4a; }
        .product-card { background: #1f3b1a; border-radius: 20px; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .product-card button { background: #ffcf4a; border: none; padding: 6px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        hr { border-color: #4f7840; margin: 15px 0; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .error-message { background: #8b3a3a; }
        .logout-btn { background: #8b5a2b; color: white; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        function formatMoney(fils){ return (fils/1000).toFixed(3)+' د.أ'; }
        function loadSession(){ const saved=localStorage.getItem('farmSession'); if(!saved){window.location.href='index.html';return null;} try{const data=JSON.parse(saved); if(Date.now()-data.loginTime>86400000){localStorage.removeItem('farmSession');window.location.href='index.html';return null;} return data;}catch(e){window.location.href='index.html';return null;} }
        let session=null, player=null;
        const STORE_ITEMS = {
            'Wheat': { name:'قمح', emoji:'🌾', price:2000, type:'بذور', description:'بذور قمح' },
            'Tomato': { name:'طماطم', emoji:'🍅', price:3000, type:'بذور', description:'بذور طماطم' },
            'Carrot': { name:'جزر', emoji:'🥕', price:1000, type:'بذور', description:'بذور جزر' },
            'Potato': { name:'بطاطا', emoji:'🥔', price:2000, type:'بذور', description:'بذور بطاطا' },
            'Pepper': { name:'فلفل', emoji:'🌶️', price:4000, type:'بذور', description:'بذور فلفل' },
            'Strawberry': { name:'فراولة', emoji:'🍓', price:5000, type:'بذور', description:'بذور فراولة' },
            'Watermelon': { name:'بطيخ', emoji:'🍉', price:8000, type:'بذور', description:'بذور بطيخ' },
            'Chicken': { name:'دجاجة', emoji:'🐔', price:20000, type:'حيوانات', description:'تنتج بيضاً كل 10 ثوانٍ' },
            'Cow': { name:'بقرة', emoji:'🐄', price:50000, type:'حيوانات', description:'تنتج حليباً كل 20 ثانية' },
            'Sheep': { name:'خروف', emoji:'🐑', price:40000, type:'حيوانات', description:'ينتج صوفاً كل 15 ثانية' }
        };
        function loadGame(){
            const key=session.isGuest?'guestGame':'game_'+session.username;
            const saved=localStorage.getItem(key);
            if(saved){ player=JSON.parse(saved); if(!player.inventory) player.inventory={}; if(!player.animals) player.animals=[]; if(!player.gold) player.gold=0; }
            else player={ gold:0, inventory:{}, animals:[], score:0, fields:[] };
        }
        function saveGame(){ const key=session.isGuest?'guestGame':'game_'+session.username; localStorage.setItem(key,JSON.stringify(player)); }
        function showMessage(msg,isError){ const msgDiv=document.getElementById('message'); msgDiv.innerHTML=msg; msgDiv.className=isError?'message error-message':'message'; msgDiv.style.display='block'; setTimeout(()=>{msgDiv.style.display='none';},3000); }
        // دوال النقل
        function getPlayerLocation(username){ if(username==='المتجر المركزي') return {lat:31.9474,lon:35.9332}; const saved=localStorage.getItem('location_'+username); if(saved) return JSON.parse(saved); return null; }
        function loadShipments(){ const all=localStorage.getItem('globalShipments'); return all?JSON.parse(all):[]; }
        function saveShipments(shipments){ localStorage.setItem('globalShipments',JSON.stringify(shipments)); }
        function buyItem(itemKey){
            const item=STORE_ITEMS[itemKey]; if(!item) return;
            if(player.gold<item.price){ showMessage(`⚠️ لا تملك ${formatMoney(item.price)}`,true); return; }
            player.gold-=item.price; saveGame();
            // إنشاء طلب نقل
            const storeLoc={lat:31.9474,lon:35.9332};
            const buyerLoc=getPlayerLocation(session.username);
            const shipments=loadShipments();
            shipments.push({ id:Date.now(), from:'المتجر المركزي', to:session.username, from_location:storeLoc, to_location:buyerLoc, item:itemKey, quantity:1, status:'pending', assigned_to:null, assigned_at:null, reward:Math.floor(item.price*0.1) });
            saveShipments(shipments);
            // إضافة الحيوان مباشرة إذا كان حيواناً (لتجنب انتظار النقل، ولكن يمكن جعله عبر النقل أيضاً)
            if(item.type==='حيوانات'){
                if(!player.animals) player.animals=[];
                const interval = itemKey==='Chicken'?10000:(itemKey==='Cow'?20000:15000);
                player.animals.push({ type:itemKey, lastCollect:Date.now()-interval });
                saveGame();
            } else {
                // البذور ستصل عن طريق النقل، ولكن نضيفها فوراً لتجنب تعقيد (أو يمكن الاحتفاظ بطلب النقل)
                // هنا نضيفها فوراً للاختبار (يمكن تعديل لاحقاً)
                player.inventory[itemKey]=(player.inventory[itemKey]||0)+1;
                saveGame();
            }
            showMessage(`✅ تم شراء ${item.emoji} ${item.name}. سيتم توصيله بواسطة لاعب نقل.`);
            renderStore();
        }
        function renderStore(){
            let grouped={ 'بذور':[], 'حيوانات':[] };
            for(let [key,item] of Object.entries(STORE_ITEMS)) grouped[item.type].push({key,item});
            let storeHtml='';
            for(let [type,items] of Object.entries(grouped)){ if(items.length===0) continue; storeHtml+=`<div class="category-section"><div class="category-title">📦 ${type}</div>`;
                for(let {key,item} of items) storeHtml+=`<div class="product-card"><div>${item.emoji} ${item.name}</div><div>💰 ${formatMoney(item.price)}</div><div style="font-size:13px;">${item.description}</div><button onclick="window.buyItem('${key}')">شراء</button></div>`;
                storeHtml+=`</div>`;
            }
            document.getElementById('app').innerHTML=`<div class="store-container"><div class="header"><div class="gold">💰 ${formatMoney(player.gold)}</div><div>👤 ${session.username}</div><div class="nav-buttons"><a href="dashboard.html" class="nav-btn">🏠 الرئيسية</a><a href="market.html" class="nav-btn">🛒 السوق</a><button class="logout-btn" id="logoutBtn">🚪 خروج</button></div></div><div class="content"><h2>🏪 المتجر المركزي</h2>${storeHtml}<div id="message" class="message"></div></div></div>`;
            document.getElementById('logoutBtn').onclick=()=>{ localStorage.removeItem('farmSession'); window.location.href='index.html'; };
        }
        session=loadSession(); if(session){ loadGame(); renderStore(); }
        window.buyItem=buyItem;
    </script>
</body>
</html>
