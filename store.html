<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المتجر | منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .store-container { max-width: 800px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .category-section { margin-bottom: 25px; }
        .category-title { background: #1f3b1a; padding: 8px 15px; border-radius: 30px; margin-bottom: 10px; font-size: 18px; border-right: 4px solid #ffcf4a; }
        .product-card { background: #1f3b1a; border-radius: 20px; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .product-card button { background: #ffcf4a; border: none; padding: 6px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        hr { border-color: #4f7840; margin: 15px 0; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .error-message { background: #8b3a3a; }
        .logout-btn { background: #8b5a2b; color: white; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        // منتجات المتجر
        const STORE_ITEMS = {
            // بذور
            'Wheat': { name: 'قمح', emoji: '🌾', price: 2, type: 'بذور', description: 'بذور قمح' },
            'Tomato': { name: 'طماطم', emoji: '🍅', price: 3, type: 'بذور', description: 'بذور طماطم' },
            'Carrot': { name: 'جزر', emoji: '🥕', price: 1, type: 'بذور', description: 'بذور جزر' },
            'Potato': { name: 'بطاطا', emoji: '🥔', price: 2, type: 'بذور', description: 'بذور بطاطا' },
            'Pepper': { name: 'فلفل', emoji: '🌶️', price: 4, type: 'بذور', description: 'بذور فلفل' },
            'Strawberry': { name: 'فراولة', emoji: '🍓', price: 5, type: 'بذور', description: 'بذور فراولة' },
            'Watermelon': { name: 'بطيخ', emoji: '🍉', price: 8, type: 'بذور', description: 'بذور بطيخ' },
            // حيوانات
            'Chicken': { name: 'دجاجة', emoji: '🐔', price: 20, type: 'حيوانات', description: 'تنتج بيضاً كل 10 ثوانٍ' },
            'Cow': { name: 'بقرة', emoji: '🐄', price: 50, type: 'حيوانات', description: 'تنتج حليباً كل 20 ثانية' },
            'Sheep': { name: 'خروف', emoji: '🐑', price: 40, type: 'حيوانات', description: 'ينتج صوفاً كل 15 ثانية' }
        };
        
        let session = null;
        let player = null;
        
        // دوال مساعدة للنقل (يجب أن تكون متطابقة مع الموجودة في market.html و delivery.html)
        function getPlayerLocation(username) {
            if (username === 'المتجر المركزي') return { lat: 31.9474, lon: 35.9332 };
            const key = 'location_' + username;
            const saved = localStorage.getItem(key);
            if (saved) return JSON.parse(saved);
            return null;
        }
        
        function loadShipments() {
            const all = localStorage.getItem('globalShipments');
            return all ? JSON.parse(all) : [];
        }
        
        function saveShipments(shipments) {
            localStorage.setItem('globalShipments', JSON.stringify(shipments));
        }
        
        function loadSession() {
            const saved = localStorage.getItem('farmSession');
            if (!saved) { window.location.href = 'index.html'; return null; }
            try {
                const data = JSON.parse(saved);
                if (Date.now() - data.loginTime > 86400000) {
                    localStorage.removeItem('farmSession');
                    window.location.href = 'index.html';
                    return null;
                }
                return data;
            } catch(e) { window.location.href = 'index.html'; return null; }
        }
        
        function loadGame() {
            const saved = localStorage.getItem('farmGame_' + session.userId);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    player = data;
                } catch(e) {}
            }
            if (!player) {
                player = { gold: 0, score: 0, inventory: {}, fields: [], animals: [] };
            }
            if (!player.inventory) player.inventory = {};
            if (!player.animals) player.animals = [];
            if (!player.fields) player.fields = [null, null, null, null];
        }
        
        function saveGame() {
            localStorage.setItem('farmGame_' + session.userId, JSON.stringify({
                gold: player.gold,
                score: player.score,
                fields: player.fields,
                animals: player.animals,
                inventory: player.inventory
            }));
        }
        
        function showMessage(msg, isError = false) {
            const msgDiv = document.getElementById('message');
            if (msgDiv) {
                msgDiv.innerHTML = msg;
                msgDiv.className = isError ? 'message error-message' : 'message';
                msgDiv.style.display = 'block';
                setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
            }
        }
        
        function buyItem(itemKey) {
            const item = STORE_ITEMS[itemKey];
            if (!item) return;
            if (player.gold < item.price) {
                showMessage(`⚠️ لا تملك ${item.price} ذهب`, true);
                return;
            }
            // خصم الذهب أولاً
            player.gold -= item.price;
            saveGame();
            
            // إذا كان المنتج حيواناً، نضيفه إلى قائمة الحيوانات في اللاعب (للمزرعة)
            if (item.type === 'حيوانات') {
                player.animals.push({ type: itemKey, lastCollect: Date.now() - (itemKey === 'Chicken' ? 10000 : (itemKey === 'Cow' ? 20000 : 15000)) });
                saveGame();
                renderStore();
                showMessage(`✅ اشتريت ${item.emoji} ${item.name}. تم إضافته إلى حظيرتك.`);
                return;
            }
            
            // بالنسبة للبذور والمواد الأخرى: إنشاء طلب نقل
            const storeLocation = { lat: 31.9474, lon: 35.9332 };
            const buyerLocation = getPlayerLocation(session.username);
            const shipments = loadShipments();
            const newShipment = {
                id: Date.now(),
                from: 'المتجر المركزي',
                to: session.username,
                from_location: storeLocation,
                to_location: buyerLocation,
                item: itemKey,
                quantity: 1,
                status: 'pending',
                assigned_to: null,
                assigned_at: null,
                reward: Math.floor(item.price * 0.1)
            };
            shipments.push(newShipment);
            saveShipments(shipments);
            
            renderStore();
            showMessage(`✅ تم شراء ${item.emoji} ${item.name}. سيتم توصيله بواسطة لاعب نقل.`);
        }
        
        function logoutToDashboard() {
            window.location.href = 'dashboard.html';
        }
        
        function renderStore() {
            // تجميع المنتجات حسب النوع
            let grouped = { 'بذور': [], 'حيوانات': [] };
            for (let [key, item] of Object.entries(STORE_ITEMS)) {
                grouped[item.type].push({ key, item });
            }
            
            let storeHtml = '';
            for (let [type, items] of Object.entries(grouped)) {
                if (items.length === 0) continue;
                storeHtml += `<div class="category-section"><div class="category-title">📦 ${type}</div>`;
                for (let {key, item} of items) {
                    storeHtml += `
                        <div class="product-card">
                            <div>${item.emoji} ${item.name}</div>
                            <div>💰 ${item.price} ذهب</div>
                            <div style="font-size:13px;">${item.description}</div>
                            <button onclick="window.buyItem('${key}')">شراء</button>
                        </div>
                    `;
                }
                storeHtml += `</div>`;
            }
            
            document.getElementById('app').innerHTML = `
                <div class="store-container">
                    <div class="header">
                        <div class="gold">💰 ${player.gold} ذهب</div>
                        <div>👤 ${session.username}</div>
                        <div class="nav-buttons">
                            <button class="nav-btn" id="dashboardBtn">🏠 القائمة الرئيسية</button>
                        </div>
                    </div>
                    <div class="content">
                        <h2>🏪 المتجر المركزي</h2>
                        <p>شراء بذور أو حيوانات. سيتم توصيل البذور عن طريق النقل، والحيوانات تضاف فوراً لحظيرتك.</p>
                        ${storeHtml}
                        <div id="message" class="message"></div>
                    </div>
                </div>
            `;
            document.getElementById('dashboardBtn').onclick = logoutToDashboard;
        }
        
        session = loadSession();
        if (session) {
            loadGame();
            renderStore();
        }
        
        window.buyItem = buyItem;
    </script>
</body>
</html>
