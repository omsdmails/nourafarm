<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تحويل الأموال - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; width: 100%; background: #2e4a2e; border-radius: 40px; padding: 30px; color: white; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 30px; border: none; font-size: 16px; }
        button { background: #ffcf4a; font-weight: bold; cursor: pointer; }
        .nav-btn { background: #3b5e2b; color: white; text-decoration: none; display: inline-block; margin-top: 15px; padding: 8px 20px; border-radius: 30px; }
        .message { margin-top: 15px; padding: 10px; border-radius: 20px; }
        .success { background: #2a6b2a; color: #c0ffc0; }
        .error { background: #8b3a3a; color: #ffc0c0; }
        .gold-display { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; display: inline-block; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>💰 تحويل الأموال</h1>
        <p>يمكنك إرسال دينار إلى لاعب آخر</p>
        <div class="gold-display" id="balance">💰 0.000 د.أ</div>
        <input type="text" id="recipient" placeholder="اسم المستلم">
        <input type="number" id="amount" placeholder="المبلغ بالدينار (مثال: 0.500)" step="0.001" min="0.001">
        <button id="transferBtn">📤 إرسال المال</button>
        <div id="msg"></div>
        <a href="dashboard.html" class="nav-btn">🏠 العودة للرئيسية</a>
    </div>
    <script>
        function formatMoney(fils){ return (fils/1000).toFixed(3)+' د.أ'; }
        function parseDinarToFils(dinarStr){ let dinars=parseFloat(dinarStr); if(isNaN(dinars)) return null; return Math.floor(dinars*1000); }
        function loadSession(){ const saved=localStorage.getItem('farmSession'); if(!saved) return null; try{const data=JSON.parse(saved); if(Date.now()-data.loginTime>86400000){localStorage.removeItem('farmSession');return null;} return data;}catch(e){return null;} }
        function loadPlayerData(username,isGuest){ if(isGuest){ const guest=localStorage.getItem('guestGame'); return guest?JSON.parse(guest):null; } else { const saved=localStorage.getItem('game_'+username); return saved?JSON.parse(saved):null; } }
        function savePlayerData(username,isGuest,data){ if(isGuest) localStorage.setItem('guestGame',JSON.stringify(data)); else localStorage.setItem('game_'+username,JSON.stringify(data)); }
        function updateBalanceDisplay(){ const session=loadSession(); if(!session) return; const playerData=loadPlayerData(session.username,session.isGuest); if(playerData) document.getElementById('balance').innerHTML=`💰 ${formatMoney(playerData.gold||0)}`; }
        function transferMoney(){
            const session=loadSession(); if(!session){ showMessage('يجب تسجيل الدخول أولاً',true); return; }
            if(session.isGuest){ showMessage('الضيوف لا يمكنهم إرسال الأموال. قم بإنشاء حساب مجاني.',true); return; }
            const recipientName=document.getElementById('recipient').value.trim(); const amountDinar=document.getElementById('amount').value;
            if(!recipientName){ showMessage('⚠️ أدخل اسم المستلم',true); return; }
            if(recipientName===session.username){ showMessage('⚠️ لا يمكنك إرسال المال لنفسك',true); return; }
            const amountFils=parseDinarToFils(amountDinar); if(amountFils===null || amountFils<=0){ showMessage('⚠️ أدخل مبلغاً صحيحاً (مثال: 0.500)',true); return; }
            const senderData=loadPlayerData(session.username,false); if(!senderData){ showMessage('⚠️ حدث خطأ في بيانات حسابك',true); return; }
            if((senderData.gold||0)<amountFils){ showMessage(`⚠️ رصيدك غير كافٍ. رصيدك الحالي: ${formatMoney(senderData.gold||0)}`,true); return; }
            const recipientExists=localStorage.getItem('game_'+recipientName)!==null; if(!recipientExists){ showMessage(`⚠️ لا يوجد لاعب باسم "${recipientName}"`,true); return; }
            const recipientData=loadPlayerData(recipientName,false); if(!recipientData){ showMessage('⚠️ حدث خطأ في بيانات المستلم',true); return; }
            senderData.gold=(senderData.gold||0)-amountFils; recipientData.gold=(recipientData.gold||0)+amountFils;
            savePlayerData(session.username,false,senderData); savePlayerData(recipientName,false,recipientData);
            let transactions=localStorage.getItem('transfer_history'); transactions=transactions?JSON.parse(transactions):[]; transactions.unshift({ id:Date.now(), from:session.username, to:recipientName, amount:amountFils, date:new Date().toISOString() }); localStorage.setItem('transfer_history',JSON.stringify(transactions));
            showMessage(`✅ تم إرسال ${formatMoney(amountFils)} إلى ${recipientName}`,false);
            updateBalanceDisplay(); document.getElementById('amount').value=''; document.getElementById('recipient').value='';
        }
        function showMessage(msg,isError){ const msgDiv=document.getElementById('msg'); msgDiv.innerHTML=`<div class="message ${isError?'error':'success'}">${msg}</div>`; setTimeout(()=>msgDiv.innerHTML='',3000); }
        const session=loadSession(); if(!session){ document.getElementById('app').innerHTML=`<div class="container"><h2>⚠️ يرجى تسجيل الدخول</h2><a href="index.html" class="nav-btn">🔓 تسجيل الدخول</a></div>`; } else { updateBalanceDisplay(); document.getElementById('transferBtn').onclick=transferMoney; }
    </script>
</body>
</html>
