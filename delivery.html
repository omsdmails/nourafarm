<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>النقل والتوصيل | منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .container { max-width: 800px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .card { background: #1f3b1a; border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .truck-card { background: #2c5e2a; border-radius: 20px; padding: 12px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .shipment-card { background: #2c5e2a; border-radius: 20px; padding: 12px; margin: 8px 0; }
        button { background: #ffcf4a; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .error-message { background: #8b3a3a; }
        .logout-btn { background: #8b5a2b; color: white; }
        hr { border-color: #4f7840; margin: 15px 0; }
        .progress-bar { background: #4f7840; height: 8px; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .progress-fill { background: #ffcf4a; width: 0%; height: 100%; transition: width 0.3s; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        let session = null;
        let player = null;
        let trucks = []; // شاحنات اللاعب: { id, name, status, missionEndTime, assignedShipmentId }
        
        // تحميل وحفظ البيانات العامة
        function loadShipments() {
            const all = localStorage.getItem('globalShipments');
            return all ? JSON.parse(all) : [];
        }
        function saveShipments(shipments) {
            localStorage.setItem('globalShipments', JSON.stringify(shipments));
        }
        
        function loadTrucks() {
            const key = session.isGuest ? 'guestTrucks' : 'trucks_' + session.username;
            const saved = localStorage.getItem(key);
            trucks = saved ? JSON.parse(saved) : [];
            if (trucks.length === 0) {
                // شاحنة ابتدائية مجانية
                trucks.push({ id: Date.now(), name: 'شاحنة صغيرة', status: 'available', missionEndTime: 0, assignedShipmentId: null });
                saveTrucks();
            }
        }
        function saveTrucks() {
            const key = session.isGuest ? 'guestTrucks' : 'trucks_' + session.username;
            localStorage.setItem(key, JSON.stringify(trucks));
        }
        
        function loadSession() { /* كما هو سابق */ }
        function loadGame() { /* كما هو سابق */ }
        function saveGame() { /* كما هو سابق */ }
        function showMessage(msg, isError) { /* كما هو سابق */ }
        
        // شراء شاحنة جديدة
        function buyTruck() {
            const price = 100;
            if (player.gold < price) { showMessage(`⚠️ تحتاج ${price} ذهب`, true); return; }
            player.gold -= price;
            saveGame();
            trucks.push({ id: Date.now(), name: `شاحنة ${trucks.length+1}`, status: 'available', missionEndTime: 0, assignedShipmentId: null });
            saveTrucks();
            renderDelivery();
            showMessage(`✅ اشتريت شاحنة جديدة`, false);
        }
        
        // استلام طلب نقل بواسطة شاحنة معينة
        function acceptShipment(shipmentId, truckIndex) {
            const truck = trucks[truckIndex];
            if (truck.status !== 'available') { showMessage(`⚠️ هذه الشاحنة مشغولة حالياً`, true); return; }
            const shipments = loadShipments();
            const shipment = shipments.find(s => s.id == shipmentId);
            if (!shipment || shipment.status !== 'pending') { showMessage(`⚠️ الطلب غير متاح`, true); return; }
            
            // تحديث حالة الشاحنة
            const deliveryTime = 30; // 30 ثانية
            truck.status = 'busy';
            truck.missionEndTime = Date.now() + deliveryTime * 1000;
            truck.assignedShipmentId = shipmentId;
            saveTrucks();
            
            // تحديث الطلب
            shipment.status = 'in_transit';
            shipment.assigned_to = session.username;
            shipment.assigned_at = Date.now();
            saveShipments(shipments);
            
            renderDelivery();
            showMessage(`🚛 تم استلام الطلب. سيتم التوصيل خلال ${deliveryTime} ثانية.`, false);
        }
        
        // التحقق من انتهاء المهمات وتطبيق التوصيل
        function checkCompletedMissions() {
            let updated = false;
            const shipments = loadShipments();
            for (let i = 0; i < trucks.length; i++) {
                const truck = trucks[i];
                if (truck.status === 'busy' && Date.now() >= truck.missionEndTime) {
                    // إتمام التوصيل
                    const shipment = shipments.find(s => s.id === truck.assignedShipmentId);
                    if (shipment && shipment.status === 'in_transit') {
                        shipment.status = 'delivered';
                        // إضافة البضاعة إلى مخزون المستلم (المشتري)
                        const receiverGameKey = (shipment.to === 'المتجر المركزي' || shipment.to.includes('زائر')) ? 
                            (shipment.to.includes('زائر') ? 'guestGame' : 'game_' + shipment.to) : 'game_' + shipment.to;
                        let receiverData = localStorage.getItem(receiverGameKey);
                        let receiver = receiverData ? JSON.parse(receiverData) : { inventory: {}, gold: 0 };
                        receiver.inventory[shipment.item] = (receiver.inventory[shipment.item] || 0) + shipment.quantity;
                        localStorage.setItem(receiverGameKey, JSON.stringify(receiver));
                        
                        // إضافة أجر النقل إلى صاحب الشاحنة (اللاعب الحالي)
                        player.gold += shipment.reward;
                        saveGame();
                        
                        // حذف الطلب بعد التوصيل (أو وضع علامة منتهي)
                        shipments.splice(shipments.indexOf(shipment), 1);
                    }
                    // إعادة الشاحنة إلى حالة جاهزة
                    truck.status = 'available';
                    truck.missionEndTime = 0;
                    truck.assignedShipmentId = null;
                    updated = true;
                }
            }
            if (updated) {
                saveShipments(shipments);
                saveTrucks();
                renderDelivery();
                showMessage(`✅ تم توصيل طلب! حصلت على ${shipments.find(s => s.assigned_to === session.username)?.reward || ''} ذهب`, false);
            }
        }
        
        function logout() { /* نفس السابق */ }
        
        function renderDelivery() {
            checkCompletedMissions(); // تحديث فوري
            const shipments = loadShipments();
            const pendingShipments = shipments.filter(s => s.status === 'pending');
            
            let shipmentsHtml = '';
            if (pendingShipments.length === 0) shipmentsHtml = '<p>🚚 لا توجد طلبات نقل حالياً</p>';
            else {
                for (let s of pendingShipments) {
                    shipmentsHtml += `
                        <div class="shipment-card">
                            <div>📦 ${s.item} x${s.quantity}</div>
                            <div>🏁 من: ${s.from} → إلى: ${s.to}</div>
                            <div>💰 أجر النقل: ${s.reward} ذهب</div>
                            ${s.assigned_to ? `<div>🚛 تم التعيين لـ ${s.assigned_to}</div>` : ''}
                        </div>
                    `;
                }
            }
            
            let trucksHtml = '';
            for (let i = 0; i < trucks.length; i++) {
                const t = trucks[i];
                let statusText = t.status === 'available' ? '✅ جاهزة' : `🚛 في مهمة (${Math.ceil((t.missionEndTime - Date.now())/1000)} ثانية متبقية)`;
                let progressPercent = 0;
                if (t.status === 'busy' && t.missionEndTime > Date.now()) {
                    const total = 30 * 1000;
                    const elapsed = total - (t.missionEndTime - Date.now());
                    progressPercent = (elapsed / total) * 100;
                }
                trucksHtml += `
                    <div class="truck-card">
                        <div>🚚 ${t.name}</div>
                        <div>${statusText}</div>
                        ${t.status === 'available' ? 
                            `<div><button onclick="window.acceptShipmentForTruck(${i})">📦 استلام طلب</button></div>` : 
                            `<div class="progress-bar"><div class="progress-fill" style="width:${progressPercent}%;"></div></div>`
                        }
                    </div>
                `;
            }
            
            // خيارات لاختيار طلب محدد (في حال وجود عدة طلبات)
            let selectShipmentHtml = '';
            if (pendingShipments.length > 0) {
                selectShipmentHtml = `
                    <select id="shipmentSelect">
                        ${pendingShipments.map(s => `<option value="${s.id}">${s.item} x${s.quantity} (من ${s.from})</option>`).join('')}
                    </select>
                    <button id="acceptSpecificBtn">قبول الطلب المختار</button>
                `;
            }
            
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="header">
                        <div class="gold">💰 ${player.gold} ذهب</div>
                        <div>👤 ${session.username}</div>
                        <div class="nav-buttons">
                            <a href="dashboard.html" class="nav-btn">🏠 الرئيسية</a>
                            <a href="market.html" class="nav-btn">🛒 السوق</a>
                            <a href="store.html" class="nav-btn">🏪 المتجر</a>
                            <button class="logout-btn" id="logoutBtn">🚪 خروج</button>
                        </div>
                    </div>
                    <div class="content">
                        <h2>🚚 النقل والتوصيل</h2>
                        <p>استلم طلبات النقل باستخدام شاحناتك، واحصل على أجر (10% من قيمة الطلب).</p>
                        <div class="card">
                            <h3>🚛 شاحناتي</h3>
                            ${trucksHtml}
                            <button onclick="window.buyTruck()" style="margin-top:10px;">➕ شراء شاحنة جديدة (100 ذهب)</button>
                        </div>
                        <div class="card">
                            <h3>📦 الطلبات المتاحة</h3>
                            ${shipmentsHtml}
                            ${selectShipmentHtml}
                        </div>
                        <div id="message" class="message"></div>
                    </div>
                </div>
            `;
            
            document.getElementById('acceptSpecificBtn')?.addEventListener('click', () => {
                const shipmentId = document.getElementById('shipmentSelect').value;
                const availableTruckIndex = trucks.findIndex(t => t.status === 'available');
                if (availableTruckIndex === -1) { showMessage('لا توجد شاحنات جاهزة', true); return; }
                acceptShipment(parseInt(shipmentId), availableTruckIndex);
            });
            document.getElementById('logoutBtn').onclick = logout;
        }
        
        window.acceptShipmentForTruck = function(truckIndex) {
            const shipments = loadShipments();
            const pending = shipments.filter(s => s.status === 'pending');
            if (pending.length === 0) { showMessage('لا توجد طلبات', true); return; }
            // يأخذ أول طلب pending
            acceptShipment(pending[0].id, truckIndex);
        };
        window.buyTruck = buyTruck;
        
        session = loadSession();
        if (session) {
            loadGame();
            loadTrucks();
            renderDelivery();
            setInterval(() => renderDelivery(), 1000); // تحديث كل ثانية للمؤقتات
        }
    </script>
</body>
</html>
