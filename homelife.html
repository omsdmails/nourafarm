<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المنزل الآمن - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .container { max-width: 800px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .house-card { background: #1f3b1a; border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .room-card, .furniture-card, .skill-card { background: #2c5e2a; border-radius: 20px; padding: 12px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        button { background: #ffcf4a; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .error-message { background: #8b3a3a; }
        .progress-bar { background: #4f7840; height: 6px; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-fill { background: #ffcf4a; width: 0%; height: 100%; transition: width 0.3s; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        function formatMoney(fils){ return (fils/1000).toFixed(3)+' د.أ'; }
        const ROOMS = { 'kitchen':{ name:'مطبخ', emoji:'🍳', price:50000, description:'يمكنك الطهي وتعلم وصفات جديدة', skill:'cooking' }, 'library':{ name:'مكتبة', emoji:'📚', price:30000, description:'تساعد على زيادة مهارة القراءة', skill:'reading' }, 'garden':{ name:'حديقة', emoji:'🌻', price:40000, description:'تحسن مهارة البستنة', skill:'gardening' }, 'workshop':{ name:'ورشة عمل', emoji:'🔨', price:60000, description:'تطوير مهارة التصنيع', skill:'crafting' } };
        const FURNITURE = { 'bed':{ name:'سرير', emoji:'🛏️', price:15000 }, 'table':{ name:'طاولة', emoji:'🪑', price:8000 }, 'lamp':{ name:'لمبة', emoji:'💡', price:5000 }, 'plant':{ name:'نبتة منزلية', emoji:'🪴', price:3000 }, 'bookshelf':{ name:'رف كتب', emoji:'📖', price:12000 } };
        let session=null, player=null, house=null, skills=null;
        function loadSession(){ const saved=localStorage.getItem('farmSession'); if(!saved){window.location.href='index.html';return null;} try{const data=JSON.parse(saved); if(Date.now()-data.loginTime>86400000){localStorage.removeItem('farmSession');window.location.href='index.html';return null;} return data;}catch(e){window.location.href='index.html';return null;} }
        function loadGame(){ const key=session.isGuest?'guestGame':'game_'+session.username; const saved=localStorage.getItem(key); if(saved){ player=JSON.parse(saved); if(!player.gold) player.gold=0; } else player={ gold:0, inventory:{} }; }
        function saveGame(){ const key=session.isGuest?'guestGame':'game_'+session.username; localStorage.setItem(key,JSON.stringify(player)); }
        function showMessage(msg,isError){ const msgDiv=document.getElementById('message'); msgDiv.innerHTML=msg; msgDiv.className=isError?'message error-message':'message'; msgDiv.style.display='block'; setTimeout(()=>{msgDiv.style.display='none';},3000); }
        function loadHouseData(){ const key='house_'+session.username; const saved=localStorage.getItem(key); house=saved?JSON.parse(saved):{ rooms:['living_room'], furniture:[], expansions:1 }; const skillsKey='skills_'+session.username; const savedSkills=localStorage.getItem(skillsKey); skills=savedSkills?JSON.parse(savedSkills):{ cooking:0, reading:0, gardening:0, crafting:0 }; }
        function saveHouseData(){ localStorage.setItem('house_'+session.username,JSON.stringify(house)); localStorage.setItem('skills_'+session.username,JSON.stringify(skills)); }
        function buyRoom(roomId){ const room=ROOMS[roomId]; if(!room) return; if(player.gold<room.price){ showMessage(`⚠️ تحتاج ${formatMoney(room.price)}`,true); return; } if(house.rooms.includes(roomId)){ showMessage(`⚠️ لديك هذه الغرفة بالفعل`,true); return; } player.gold-=room.price; house.rooms.push(roomId); saveGame(); saveHouseData(); renderHome(); showMessage(`✅ اشتريت ${room.emoji} ${room.name}!`); }
        function buyFurniture(furnitureId){ const furn=FURNITURE[furnitureId]; if(!furn) return; if(player.gold<furn.price){ showMessage(`⚠️ تحتاج ${formatMoney(furn.price)}`,true); return; } player.gold-=furn.price; house.furniture.push(furnitureId); saveGame(); saveHouseData(); renderHome(); showMessage(`✅ اشتريت ${furn.emoji} ${furn.name}!`); }
        function doActivity(activity){ let skillKey='', gain=5, msg=''; switch(activity){ case 'cook': if(!house.rooms.includes('kitchen')){ showMessage('⚠️ تحتاج إلى مطبخ للطهي! اشترِ مطبخاً أولاً.',true); return; } skillKey='cooking'; msg='🍳 قمت بالطهي! +5 مهارة طبخ'; break; case 'read': if(!house.rooms.includes('library')){ showMessage('⚠️ تحتاج إلى مكتبة للقراءة! اشترِ مكتبة أولاً.',true); return; } skillKey='reading'; msg='📚 قرأت كتاباً! +5 مهارة قراءة'; break; case 'garden': if(!house.rooms.includes('garden')){ showMessage('⚠️ تحتاج إلى حديقة! اشترِ حديقة أولاً.',true); return; } skillKey='gardening'; msg='🌻 اعتنيت بالحديقة! +5 مهارة بستنة'; break; case 'craft': if(!house.rooms.includes('workshop')){ showMessage('⚠️ تحتاج إلى ورشة عمل! اشترِ ورشة أولاً.',true); return; } skillKey='crafting'; msg='🔨 صنعت قطعة خشبية! +5 مهارة تصنيع'; break; default: return; } skills[skillKey]=(skills[skillKey]||0)+gain; if(skills[skillKey]>100) skills[skillKey]=100; saveHouseData(); renderHome(); showMessage(msg); }
        function renderHome(){
            let roomsHtml=''; for(let [id,room] of Object.entries(ROOMS)){ const owned=house.rooms.includes(id); roomsHtml+=`<div class="room-card"><div><strong>${room.emoji} ${room.name}</strong><br>${room.description}<br>💰 ${formatMoney(room.price)}</div>${!owned?`<button onclick="window.buyRoom('${id}')">شراء</button>`:'<span>✅ مملوكة</span>'}</div>`; }
            let furnitureHtml=''; for(let [id,furn] of Object.entries(FURNITURE)){ const owned=house.furniture.includes(id); furnitureHtml+=`<div class="furniture-card"><div>${furn.emoji} ${furn.name} - 💰 ${formatMoney(furn.price)}</div>${!owned?`<button onclick="window.buyFurniture('${id}')">شراء</button>`:'<span>✅ مملوك</span>'}</div>`; }
            let skillsHtml=''; for(let [skill,value] of Object.entries(skills)) skillsHtml+=`<div class="skill-card"><div>${skill==='cooking'?'🍳 طبخ':skill==='reading'?'📚 قراءة':skill==='gardening'?'🌻 بستنة':'🔨 تصنيع'}</div><div class="progress-bar" style="width:100px;"><div class="progress-fill" style="width:${value}%;"></div></div><span>${value}/100</span></div>`;
            let activitiesHtml=`<div class="house-card"><h3>🎮 أنشطة يومية</h3><button onclick="window.doActivity('cook')">🍳 طهي (يحتاج مطبخ)</button><button onclick="window.doActivity('read')">📚 قراءة (يحتاج مكتبة)</button><button onclick="window.doActivity('garden')">🌻 بستنة (يحتاج حديقة)</button><button onclick="window.doActivity('craft')">🔨 تصنيع (يحتاج ورشة)</button></div>`;
            document.getElementById('app').innerHTML=`<div class="container"><div class="header"><div class="gold">💰 ${formatMoney(player.gold)}</div><div>👤 ${session.username}</div><div class="nav-buttons"><button class="nav-btn" id="dashboardBtn">🏠 القائمة الرئيسية</button></div></div><div class="content"><h2>🏡 منزلي الآمن</h2><div class="house-card"><h3>🚪 الغرف</h3>${roomsHtml}<hr><h3>🪑 الأثاث والديكور</h3>${furnitureHtml}<hr><h3>📈 المهارات</h3>${skillsHtml}${activitiesHtml}</div><div id="message" class="message"></div></div></div>`;
            document.getElementById('dashboardBtn').onclick=()=>{ window.location.href='dashboard.html'; };
        }
        session=loadSession(); if(session){ loadGame(); loadHouseData(); renderHome(); }
        window.buyRoom=buyRoom; window.buyFurniture=buyFurniture; window.doActivity=doActivity;
    </script>
</body>
</html>
