<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المصنع - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .container { max-width: 800px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .factory-card { background: #1f3b1a; border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .machine-card { background: #2c5e2a; border-radius: 20px; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        button { background: #ffcf4a; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .error-message { background: #8b3a3a; }
        .progress-bar { background: #4f7840; height: 6px; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .progress-fill { background: #ffcf4a; width: 0%; height: 100%; transition: width 0.3s; }
        .buy-link { background: #8b5a2b; color: white; padding: 2px 8px; border-radius: 30px; font-size: 12px; text-decoration: none; margin-right: 8px; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        function formatMoney(fils){ return (fils/1000).toFixed(3)+' د.أ'; }
        const MACHINES = {
            'mill': { name:'مطحنة حبوب', emoji:'🏭', input:'Wheat', output:'Flour', time:8, cost:50000, profit:5000 },
            'press': { name:'معصرة زيتون', emoji:'⛽', input:'Olives', output:'Oil', time:10, cost:60000, profit:8000 },
            'bakery': { name:'مخبز', emoji:'🍞', input:'Flour', output:'Bread', time:6, cost:40000, profit:4000 },
            'juicer': { name:'معصرة فواكه', emoji:'🧃', input:'Strawberry', output:'Juice', time:5, cost:35000, profit:6000 }
        };
        let session=null, player=null, factories=[];
        function loadSession(){ const saved=localStorage.getItem('farmSession'); if(!saved){window.location.href='index.html';return null;} try{const data=JSON.parse(saved); if(Date.now()-data.loginTime>86400000){localStorage.removeItem('farmSession');window.location.href='index.html';return null;} return data;}catch(e){window.location.href='index.html';return null;} }
        function loadGame(){ const key=session.isGuest?'guestGame':'game_'+session.username; const saved=localStorage.getItem(key); if(saved){ player=JSON.parse(saved); if(!player.inventory) player.inventory={}; if(!player.gold) player.gold=0; } else player={ gold:0, inventory:{}, score:0, fields:[], animals:[] }; }
        function saveGame(){ const key=session.isGuest?'guestGame':'game_'+session.username; localStorage.setItem(key,JSON.stringify(player)); }
        function showMessage(msg,isError){ const msgDiv=document.getElementById('message'); msgDiv.innerHTML=msg; msgDiv.className=isError?'message error-message':'message'; msgDiv.style.display='block'; setTimeout(()=>{msgDiv.style.display='none';},3000); }
        function loadFactories(){ const key=session.isGuest?'guestFactories':'factories_'+session.username; const saved=localStorage.getItem(key); factories=saved?JSON.parse(saved):[]; }
        function saveFactories(){ const key=session.isGuest?'guestFactories':'factories_'+session.username; localStorage.setItem(key,JSON.stringify(factories)); }
        function buyMachine(machineId){ const machine=MACHINES[machineId]; if(!machine) return; if(player.gold<machine.cost){ showMessage(`⚠️ تحتاج ${formatMoney(machine.cost)}`,true); return; } player.gold-=machine.cost; saveGame(); factories.push({ id:Date.now(), type:machineId, status:'idle', startTime:0, progress:0 }); saveFactories(); renderFactory(); showMessage(`✅ اشتريت ${machine.emoji} ${machine.name}`); }
        function buyFromMarket(ingredient){ localStorage.setItem('market_focus_item',ingredient); window.location.href='market.html'; }
        function startProduction(factoryIndex){ const fac=factories[factoryIndex]; const machine=MACHINES[fac.type]; if(fac.status==='busy'){ showMessage('⚠️ الآلة مشغولة',true); return; } const requiredQty=1; if((player.inventory[machine.input]||0)<requiredQty){ showMessage(`⚠️ لا تملك ${machine.input}. يمكنك شراؤه من السوق.`,true); return; } player.inventory[machine.input]-=requiredQty; saveGame(); fac.status='busy'; fac.startTime=Date.now(); fac.progress=0; saveFactories(); renderFactory(); showMessage(`⚙️ بدأ إنتاج ${machine.output} في ${machine.name}`); }
        function checkProductionCompletion(){ let updated=false; for(let i=0;i<factories.length;i++){ const fac=factories[i]; if(fac.status==='busy'){ const machine=MACHINES[fac.type]; const elapsed=(Date.now()-fac.startTime)/1000; if(elapsed>=machine.time){ fac.status='idle'; fac.startTime=0; player.inventory[machine.output]=(player.inventory[machine.output]||0)+1; player.gold+=machine.profit; saveGame(); updated=true; } else fac.progress=(elapsed/machine.time)*100; } } if(updated){ saveFactories(); renderFactory(); showMessage(`✅ تم إنتاج منتج جديد!`); } }
        function renderFactory(){ checkProductionCompletion(); let machinesHtml=''; for(let i=0;i<factories.length;i++){ const fac=factories[i]; const machine=MACHINES[fac.type]; let statusHtml=''; if(fac.status==='busy'){ const remaining=Math.ceil((machine.time-(Date.now()-fac.startTime)/1000)); statusHtml=`<div>⏳ جاري الإنتاج (${remaining} ثانية)</div><div class="progress-bar"><div class="progress-fill" style="width:${fac.progress}%;"></div></div>`; } else { const hasInput=(player.inventory[machine.input]||0)>=1; statusHtml=`<div>${hasInput?'✅ جاهز للإنتاج':`⚠️ ينقصك ${machine.input} <a class="buy-link" href="#" onclick="event.preventDefault(); window.buyFromMarket('${machine.input}');">🛒 شراء</a>`}</div>${hasInput?`<button onclick="window.startProduction(${i})">▶️ ابدأ الإنتاج (يتطلب ${machine.input})</button>`:''}`; } machinesHtml+=`<div class="machine-card"><div><strong>${machine.emoji} ${machine.name}</strong><br>المدخل: ${machine.input} → المنتج: ${machine.output}<br>الربح: ${formatMoney(machine.profit)} | الوقت: ${machine.time} ثانية | التكلفة: ${formatMoney(machine.cost)}</div><div>${statusHtml}</div></div>`; } if(factories.length===0) machinesHtml='<p>🚫 لا تملك آلات بعد. اشترِ آلة للبدء.</p>';
        let buyBtns=''; for(let [id,m] of Object.entries(MACHINES)) buyBtns+=`<button onclick="window.buyMachine('${id}')" style="margin:5px;">${m.emoji} شراء ${m.name} (${formatMoney(m.cost)})</button>`;
        let invHtml='<div style="background:#1f3b1a; border-radius:20px; padding:12px; margin-top:15px;"><h3>📦 مخزونك الحالي</h3>'; for(let [item,qty] of Object.entries(player.inventory)) if(qty>0) invHtml+=`<span style="background:#3b5e2b; border-radius:30px; padding:5px 12px; display:inline-block; margin:4px;">${item}: ${qty}</span>`; invHtml+='</div>';
        document.getElementById('app').innerHTML=`<div class="container"><div class="header"><div class="gold">💰 ${formatMoney(player.gold)}</div><div>👤 ${session.username}</div><div class="nav-buttons"><button class="nav-btn" id="dashboardBtn">🏠 القائمة الرئيسية</button></div></div><div class="content"><h2>🏭 المصنع</h2><div class="factory-card"><h3>⚙️ آلاتي</h3>${machinesHtml}<hr><h3>➕ شراء آلات جديدة</h3>${buyBtns}</div>${invHtml}<div id="message" class="message"></div></div></div>`;
        document.getElementById('dashboardBtn').onclick=()=>{ window.location.href='dashboard.html'; }; }
        session=loadSession(); if(session){ loadGame(); loadFactories(); renderFactory(); setInterval(()=>renderFactory(),1000); }
        window.buyMachine=buyMachine; window.startProduction=startProduction; window.buyFromMarket=buyFromMarket;
    </script>
</body>
</html>
