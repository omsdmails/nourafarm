<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المصنع | منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .container { max-width: 800px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .factory-card { background: #1f3b1a; border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .machine-card { background: #2c5e2a; border-radius: 20px; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        button { background: #ffcf4a; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .logout-btn { background: #8b5a2b; color: white; }
        .progress-bar { background: #4f7840; height: 6px; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .progress-fill { background: #ffcf4a; width: 0%; height: 100%; transition: width 0.3s; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        let session = null;
        let player = null;
        let factories = []; // قائمة المصانع التي يمتلكها اللاعب
        
        // تعريف الآلات المتاحة
        const MACHINES = {
            'mill': { name: 'مطحنة حبوب', emoji: '🏭', input: 'Wheat', output: 'Flour', time: 8, cost: 50, profit: 5 },
            'press': { name: 'معصرة زيتون', emoji: '⛽', input: 'Olives', output: 'Oil', time: 10, cost: 60, profit: 8 },
            'bakery': { name: 'مخبز', emoji: '🍞', input: 'Flour', output: 'Bread', time: 6, cost: 40, profit: 4 },
            'juicer': { name: 'معصرة فواكه', emoji: '🧃', input: 'Strawberry', output: 'Juice', time: 5, cost: 35, profit: 6 }
        };
        
        function loadSession() { /* مثل السابق */ }
        function loadGame() { /* مثل السابق */ }
        function saveGame() { /* مثل السابق */ }
        function showMessage(msg, isError) { /* مثل السابق */ }
        
        function loadFactories() {
            const key = session.isGuest ? 'guestFactories' : 'factories_' + session.username;
            const saved = localStorage.getItem(key);
            factories = saved ? JSON.parse(saved) : [];
        }
        function saveFactories() {
            const key = session.isGuest ? 'guestFactories' : 'factories_' + session.username;
            localStorage.setItem(key, JSON.stringify(factories));
        }
        
        // شراء آلة جديدة
        function buyMachine(machineId) {
            const machine = MACHINES[machineId];
            if (!machine) return;
            if (player.gold < machine.cost) {
                showMessage(`⚠️ تحتاج ${machine.cost} ذهب`, true);
                return;
            }
            player.gold -= machine.cost;
            saveGame();
            factories.push({
                id: Date.now(),
                type: machineId,
                status: 'idle',
                startTime: 0,
                progress: 0
            });
            saveFactories();
            renderFactory();
            showMessage(`✅ اشتريت ${machine.emoji} ${machine.name}`);
        }
        
        // بدء الإنتاج في آلة معينة
        function startProduction(factoryIndex) {
            const fac = factories[factoryIndex];
            const machine = MACHINES[fac.type];
            if (fac.status === 'busy') {
                showMessage('الآلة مشغولة حالياً', true);
                return;
            }
            const requiredQty = 1;
            if (!player.inventory[machine.input] || player.inventory[machine.input] < requiredQty) {
                showMessage(`⚠️ تحتاج ${requiredQty} من ${machine.input}`, true);
                return;
            }
            player.inventory[machine.input] -= requiredQty;
            saveGame();
            fac.status = 'busy';
            fac.startTime = Date.now();
            fac.progress = 0;
            saveFactories();
            renderFactory();
            showMessage(`⚙️ بدأ إنتاج ${machine.output} في ${machine.name}`);
        }
        
        function checkProductionCompletion() {
            let updated = false;
            for (let i=0; i<factories.length; i++) {
                const fac = factories[i];
                if (fac.status === 'busy') {
                    const machine = MACHINES[fac.type];
                    const elapsed = (Date.now() - fac.startTime) / 1000;
                    if (elapsed >= machine.time) {
                        // إتمام الإنتاج
                        fac.status = 'idle';
                        fac.startTime = 0;
                        player.inventory[machine.output] = (player.inventory[machine.output] || 0) + 1;
                        player.gold += machine.profit;
                        saveGame();
                        updated = true;
                    } else {
                        fac.progress = (elapsed / machine.time) * 100;
                    }
                }
            }
            if (updated) {
                saveFactories();
                renderFactory();
                showMessage(`✅ تم إنتاج منتج جديد!`);
            }
        }
        
        function renderFactory() {
            checkProductionCompletion();
            let machinesHtml = '';
            for (let i=0; i<factories.length; i++) {
                const fac = factories[i];
                const machine = MACHINES[fac.type];
                let statusHtml = '';
                if (fac.status === 'busy') {
                    statusHtml = `
                        <div>⏳ جاري الإنتاج (${Math.ceil((machine.time - (Date.now() - fac.startTime)/1000))} ثانية)</div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${fac.progress}%;"></div></div>
                    `;
                } else {
                    statusHtml = `<div>✅ جاهز للإنتاج</div><button onclick="window.startProduction(${i})">▶️ ابدأ الإنتاج (يتطلب ${machine.input})</button>`;
                }
                machinesHtml += `
                    <div class="machine-card">
                        <div><strong>${machine.emoji} ${machine.name}</strong><br>المدخل: ${machine.input} → المنتج: ${machine.output} (ربح ${machine.profit} ذهب)<br>الوقت: ${machine.time} ثانية</div>
                        ${statusHtml}
                    </div>
                `;
            }
            if (factories.length === 0) machinesHtml = '<p>لا تملك آلات بعد. اشترِ آلة للبدء.</p>';
            
            let buyBtns = '';
            for (let [id, m] of Object.entries(MACHINES)) {
                buyBtns += `<button onclick="window.buyMachine('${id}')" style="margin:5px;">${m.emoji} شراء ${m.name} (${m.cost} ذهب)</button>`;
            }
            
            let invHtml = '<div style="background:#1f3b1a; border-radius:20px; padding:12px; margin-top:15px;"><h3>📦 مخزونك الحالي</h3>';
            for (let [item, qty] of Object.entries(player.inventory)) {
                if (qty > 0) invHtml += `<span style="background:#3b5e2b; border-radius:30px; padding:5px 12px; display:inline-block; margin:4px;">${item}: ${qty}</span>`;
            }
            invHtml += '</div>';
            
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="header">
                        <div class="gold">💰 ${player.gold} ذهب</div>
                        <div>👤 ${session.username}</div>
                        <div class="nav-buttons">
                            <a href="dashboard.html" class="nav-btn">🏠 الرئيسية</a>
                            <a href="market.html" class="nav-btn">🛒 السوق</a>
                            <a href="delivery.html" class="nav-btn">🚚 النقل</a>
                            <button class="logout-btn" id="logoutBtn">🚪 خروج</button>
                        </div>
                    </div>
                    <div class="content">
                        <h2>🏭 المصنع</h2>
                        <div class="factory-card">
                            <h3>آلاتي</h3>
                            ${machinesHtml}
                            <hr>
                            <h3>➕ شراء آلات جديدة</h3>
                            ${buyBtns}
                        </div>
                        ${invHtml}
                        <div id="message" class="message"></div>
                    </div>
                </div>
            `;
            document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('farmSession'); window.location.href = 'index.html'; };
        }
        
        session = loadSession();
        if (session) {
            loadGame();
            loadFactories();
            renderFactory();
            setInterval(() => renderFactory(), 1000);
        }
        
        window.buyMachine = buyMachine;
        window.startProduction = startProduction;
    </script>
</body>
</html>
