<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>مزرعة - نسخة مبسطة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui; background: #1e3c2c; display: flex; justify-content: center; padding: 20px; }
        #app { max-width: 500px; background: #2e4a2e; border-radius: 30px; padding: 20px; color: white; }
        button, input { padding: 10px; margin: 5px; border-radius: 30px; border: none; }
        button { background: #ffcf4a; cursor: pointer; font-weight: bold; }
        .card { background: #1f3b1a; padding: 15px; border-radius: 20px; margin: 10px 0; }
        .error { color: #ffaaaa; background: #6d2e2e; padding: 8px; border-radius: 20px; }
        .success { color: #aaffaa; background: #2a5a2a; padding: 8px; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="app">جاري التحميل...</div>
    <script>
        const SUPABASE_URL = 'https://kzheikbpxicoeohapfjb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_aVm9aZ6W5vYTVvTxo3hucw__uZ06aId';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        
        async function showMainScreen() {
            // جلب بيانات المستخدم من جدول profiles (لنفترض أنه موجود)
            let gold = 100;
            let inventory = { Wheat: 3, Tomato: 1 };
            
            const { data: profile } = await supabase.from('profiles').select('gold, inventory').eq('id', currentUser.id).single();
            if (profile) {
                gold = profile.gold;
                inventory = profile.inventory || inventory;
            } else {
                // إنشاء ملف شخصي إذا لم يكن موجوداً
                await supabase.from('profiles').insert({ id: currentUser.id, username: currentUser.email.split('@')[0], gold: 100, inventory: { Wheat: 3, Tomato: 1 } });
            }
            
            // جلب إعلانات السوق
            const { data: listings } = await supabase.from('market_listings').select('*, seller:profiles(username)').eq('status', 'active');
            
            let listingsHtml = '';
            if (listings && listings.length > 0) {
                for (let l of listings) {
                    listingsHtml += `<div style="background:#2c5e2a; margin:8px 0; padding:10px; border-radius:20px;">
                        ${l.item_name} x${l.quantity} - 💰${l.price_per_unit} - 👤${l.seller?.username || 'بائع'}
                        <button onclick="buyListing('${l.id}', ${l.price_per_unit * l.quantity})">شراء</button>
                    </div>`;
                }
            } else {
                listingsHtml = '<p>لا توجد إعلانات</p>';
            }
            
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <span>💰 ${gold} ذهب</span>
                        <span>👤 ${currentUser.email}</span>
                        <button id="logoutBtn">خروج</button>
                    </div>
                    <hr>
                    <div>
                        <h3>📦 مخزني</h3>
                        ${Object.entries(inventory).map(([item,qty]) => `<button class="sellBtn" data-item="${item}" data-price="${item === 'Wheat' ? 5 : 8}">بيع ${item} (${qty}) بـ ${item === 'Wheat' ? 5 : 8}</button>`).join('')}
                    </div>
                    <hr>
                    <div>
                        <h3>🛒 السوق المشترك</h3>
                        ${listingsHtml}
                    </div>
                    <hr>
                    <div>
                        <h4>➕ نشر إعلان</h4>
                        <select id="itemSelect">
                            ${Object.keys(inventory).map(i => `<option value="${i}">${i}</option>`)}
                        </select>
                        <input type="number" id="qty" placeholder="الكمية">
                        <input type="number" id="price" placeholder="السعر لكل وحدة">
                        <button id="publishBtn">نشر إعلان</button>
                    </div>
                    <div id="msg"></div>
                </div>
            `;
            
            document.querySelectorAll('.sellBtn').forEach(btn => {
                btn.onclick = async () => {
                    const item = btn.dataset.item;
                    const price = parseInt(btn.dataset.price);
                    const { data: profile } = await supabase.from('profiles').select('gold, inventory').eq('id', currentUser.id).single();
                    let newInv = profile.inventory;
                    if (newInv[item] <= 0) return;
                    newInv[item]--;
                    const newGold = profile.gold + price;
                    await supabase.from('profiles').update({ gold: newGold, inventory: newInv }).eq('id', currentUser.id);
                    showMainScreen();
                };
            });
            document.getElementById('publishBtn').onclick = async () => {
                const item = document.getElementById('itemSelect').value;
                const qty = parseInt(document.getElementById('qty').value);
                const price = parseInt(document.getElementById('price').value);
                if (!qty || !price) { document.getElementById('msg').innerHTML = '<div class="error">املأ الكمية والسعر</div>'; return; }
                const { data: profile } = await supabase.from('profiles').select('inventory').eq('id', currentUser.id).single();
                if (profile.inventory[item] < qty) { document.getElementById('msg').innerHTML = '<div class="error">لا تملك الكمية الكافية</div>'; return; }
                let newInv = profile.inventory;
                newInv[item] -= qty;
                await supabase.from('profiles').update({ inventory: newInv }).eq('id', currentUser.id);
                await supabase.from('market_listings').insert({ seller_id: currentUser.id, item_name: item, quantity: qty, price_per_unit: price });
                showMainScreen();
            };
            document.getElementById('logoutBtn').onclick = () => { supabase.auth.signOut(); location.reload(); };
        }
        
        window.buyListing = async (listingId, totalPrice) => {
            const { data: profile } = await supabase.from('profiles').select('gold, inventory').eq('id', currentUser.id).single();
            if (profile.gold < totalPrice) { alert('ذهب غير كاف'); return; }
            // شراء: نحتاج تفاصيل الإعلان كاملة (هذا نموذج مبسط)
            const { data: listing } = await supabase.from('market_listings').select('*').eq('id', listingId).single();
            if (!listing) return;
            // تحديث المشتري
            const newGold = profile.gold - totalPrice;
            const newInv = profile.inventory;
            newInv[listing.item_name] = (newInv[listing.item_name] || 0) + listing.quantity;
            await supabase.from('profiles').update({ gold: newGold, inventory: newInv }).eq('id', currentUser.id);
            // تحديث البائع
            const { data: seller } = await supabase.from('profiles').select('gold').eq('id', listing.seller_id).single();
            if (seller) await supabase.from('profiles').update({ gold: seller.gold + totalPrice }).eq('id', listing.seller_id);
            await supabase.from('market_listings').update({ status: 'sold' }).eq('id', listingId);
            showMainScreen();
        };
        
        async function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <h2>🌾 منصة المزرعة</h2>
                    <input type="email" id="email" placeholder="البريد الإلكتروني">
                    <input type="password" id="password" placeholder="كلمة المرور">
                    <button id="loginBtn">دخول</button>
                    <button id="signupBtn">حساب جديد</button>
                    <div id="msg"></div>
                </div>
            `;
            document.getElementById('loginBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
                if (error) document.getElementById('msg').innerHTML = `<div class="error">${error.message}</div>`;
                else start();
            };
            document.getElementById('signupBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                const { error } = await supabase.auth.signUp({ email, password: pass });
                if (error) document.getElementById('msg').innerHTML = `<div class="error">${error.message}</div>`;
                else document.getElementById('msg').innerHTML = '<div class="success">تم التسجيل، سجل الدخول</div>';
            };
        }
        
        async function start() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) { renderLogin(); return; }
            currentUser = user;
            await showMainScreen();
        }
        
        start();
    </script>
</body>
</html>
