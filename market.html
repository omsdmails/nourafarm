<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>السوق المشترك - منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .market-container { max-width: 800px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .category-section { margin-bottom: 25px; }
        .category-title { background: #1f3b1a; padding: 8px 15px; border-radius: 30px; margin-bottom: 10px; font-size: 18px; border-right: 4px solid #ffcf4a; }
        .listing-card { background: #1f3b1a; border-radius: 20px; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .listing-card button { background: #ffcf4a; border: none; padding: 6px 15px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .create-listing { background: #1f3b1a; border-radius: 20px; padding: 20px; margin-top: 20px; }
        input, select { padding: 10px; border-radius: 25px; border: none; margin: 5px; width: calc(33% - 10px); }
        button { background: #ffcf4a; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        hr { border-color: #4f7840; margin: 15px 0; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .error-message { background: #8b3a3a; }
        .logout-btn { background: #8b5a2b; color: white; }
        .empty-market { text-align: center; padding: 20px; color: #c5e0b4; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        function formatMoney(fils){ return (fils/1000).toFixed(3)+' د.أ'; }
        function loadSession(){ const saved=localStorage.getItem('farmSession'); if(!saved){window.location.href='index.html';return null;} try{const data=JSON.parse(saved); if(Date.now()-data.loginTime>86400000){localStorage.removeItem('farmSession');window.location.href='index.html';return null;} return data;}catch(e){window.location.href='index.html';return null;} }
        let session=null, player=null;
        const categories={ 'خضار':['Wheat','Tomato','Carrot','Potato','Pepper','Corn'], 'فواكه':['Strawberry','Watermelon'], 'حيواني':['Egg','Milk','Wool'], 'مصنع':['Flour','Oil','Bread','Juice'] };
        function getItemCategory(item){ for(let [cat,items] of Object.entries(categories)) if(items.includes(item)) return cat; return 'أخرى'; }
        function loadGame(){
            const key=session.isGuest?'guestGame':'game_'+session.username;
            const saved=localStorage.getItem(key);
            if(saved){ player=JSON.parse(saved); if(!player.inventory) player.inventory={}; if(!player.gold) player.gold=0; }
            else player={ gold:0, inventory:{}, score:0, fields:[], animals:[] };
        }
        function saveGame(){ const key=session.isGuest?'guestGame':'game_'+session.username; localStorage.setItem(key,JSON.stringify(player)); }
        function showMessage(msg,isError){ const msgDiv=document.getElementById('message'); msgDiv.innerHTML=msg; msgDiv.className=isError?'message error-message':'message'; msgDiv.style.display='block'; setTimeout(()=>{msgDiv.style.display='none';},3000); }
        // السوق
        function loadMarketListings(){ const all=localStorage.getItem('globalMarketListings'); let listings=all?JSON.parse(all):[]; listings=listings.filter(l=>l.status==='active'); listings.sort((a,b)=>b.listedAt-a.listedAt); return listings; }
        function saveMarketListings(listings){ localStorage.setItem('globalMarketListings',JSON.stringify(listings)); }
        // النقل
        function getPlayerLocation(username){ if(username==='المتجر المركزي') return {lat:31.9474,lon:35.9332}; const saved=localStorage.getItem('location_'+username); if(saved) return JSON.parse(saved); return null; }
        function loadShipments(){ const all=localStorage.getItem('globalShipments'); return all?JSON.parse(all):[]; }
        function saveShipments(shipments){ localStorage.setItem('globalShipments',JSON.stringify(shipments)); }
        async function createListing(item,qty,price){
            if(!player.inventory[item] || player.inventory[item]<qty){ showMessage(`⚠️ لا تملك ${qty} من ${item}`,true); return false; }
            player.inventory[item]-=qty; saveGame();
            const listings=loadMarketListings();
            listings.push({ id:Date.now(), seller:session.username, item_name:item, quantity:qty, price_per_unit:price, listedAt:Date.now(), status:'active' });
            saveMarketListings(listings);
            showMessage(`✅ تم نشر ${qty} ${item} للبيع`); renderMarket(); return true;
        }
        async function buyListing(listingId,pricePerUnit,qty,itemName,sellerName){
            const total=pricePerUnit*qty;
            if(player.gold<total){ showMessage(`⚠️ تحتاج ${formatMoney(total)}`,true); return; }
            if(sellerName===session.username){ showMessage(`⚠️ لا يمكنك شراء منتجك الخاص`,true); return; }
            player.gold-=total; saveGame();
            const sellerLoc=getPlayerLocation(sellerName);
            const buyerLoc=getPlayerLocation(session.username);
            const shipments=loadShipments();
            shipments.push({ id:Date.now(), from:sellerName, to:session.username, from_location:sellerLoc, to_location:buyerLoc, item:itemName, quantity:qty, status:'pending', assigned_to:null, assigned_at:null, reward:Math.floor(total*0.1) });
            saveShipments(shipments);
            const listings=loadMarketListings(); const newListings=listings.filter(l=>l.id!==listingId); saveMarketListings(newListings);
            showMessage(`🛒 تم شراء ${qty} ${itemName}. سيتم توصيله بواسطة لاعب نقل.`);
            renderMarket();
        }
        function renderMarket(){
            const listings=loadMarketListings();
            let grouped={'خضار':[],'فواكه':[],'حيواني':[],'مصنع':[],'أخرى':[]};
            for(let l of listings){ let cat=getItemCategory(l.item_name); grouped[cat].push(l); }
            let marketHtml='';
            for(let [cat,items] of Object.entries(grouped)){ if(items.length===0) continue; marketHtml+=`<div class="category-section"><div class="category-title">📂 ${cat}</div>`;
                for(let l of items) marketHtml+=`<div class="listing-card"><span>📦 ${l.item_name} x${l.quantity}</span><span>💰 ${formatMoney(l.price_per_unit)}</span><span>👤 ${l.seller}</span><button onclick="window.buyListing(${l.id},${l.price_per_unit},${l.quantity},'${l.item_name}','${l.seller}')">🛒 شراء</button></div>`;
                marketHtml+=`</div>`;
            }
            if(marketHtml==='') marketHtml='<div class="empty-market">🛒 لا توجد إعلانات. كن أول من ينشر!</div>';
            let itemOptions='<option value="">-- اختر منتج --</option>';
            for(let [item,qty] of Object.entries(player.inventory)) if(qty>0) itemOptions+=`<option value="${item}">${item} (${qty})</option>`;
            document.getElementById('app').innerHTML=`<div class="market-container"><div class="header"><div class="gold">💰 ${formatMoney(player.gold)}</div><div>👤 ${session.username}</div><div class="nav-buttons"><a href="dashboard.html" class="nav-btn">🏠 الرئيسية</a><a href="store.html" class="nav-btn">🏪 المتجر</a><a href="delivery.html" class="nav-btn">🚚 النقل</a><button class="logout-btn" id="logoutBtn">🚪 خروج</button></div></div><div class="content"><h2>🛒 السوق المشترك</h2><p>📦 عند الشراء، سيتم إنشاء طلب نقل. يتولى لاعبو النقل توصيله.</p>${marketHtml}<div class="create-listing"><h3>➕ نشر إعلان جديد</h3><select id="itemSelect">${itemOptions}</select><input type="number" id="qtyInput" placeholder="الكمية" min="1"><input type="number" id="priceInput" placeholder="السعر لكل وحدة (فلس)" min="1"><button id="publishBtn">📢 نشر للبيع</button></div><div id="message" class="message"></div></div></div>`;
            document.getElementById('publishBtn').onclick=()=>{ const item=document.getElementById('itemSelect').value; const qty=parseInt(document.getElementById('qtyInput').value); const price=parseInt(document.getElementById('priceInput').value); if(!item||!qty||!price){ showMessage('املأ جميع الحقول',true); return; } createListing(item,qty,price); };
            document.getElementById('logoutBtn').onclick=()=>{ localStorage.removeItem('farmSession'); window.location.href='index.html'; };
        }
        session=loadSession(); if(session){ loadGame(); renderMarket(); }
        window.buyListing=buyListing; window.createListing=createListing;
    </script>
</body>
</html>
