<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>السوق المشترك | منصة الألعاب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #1e3c2c 0%, #2a5a3a 100%); font-family: system-ui, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .market-container { max-width: 800px; width: 100%; background: #2e4a2e; border-radius: 35px; overflow: hidden; color: #f5f5dc; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .header { background: #1f3b1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .gold { background: #ffcf4a; color: #1f3b1a; padding: 8px 16px; border-radius: 40px; font-weight: bold; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { background: #3b5e2b; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .nav-btn.active { background: #ffcf4a; color: #1f3b1a; }
        .content { padding: 20px; }
        .category-section { margin-bottom: 25px; }
        .category-title { background: #1f3b1a; padding: 8px 15px; border-radius: 30px; margin-bottom: 10px; font-size: 18px; border-right: 4px solid #ffcf4a; }
        .listing-card { background: #1f3b1a; border-radius: 20px; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .listing-card button { background: #ffcf4a; border: none; padding: 6px 15px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .create-listing { background: #1f3b1a; border-radius: 20px; padding: 20px; margin-top: 20px; }
        input, select { padding: 10px; border-radius: 25px; border: none; margin: 5px; width: calc(33% - 10px); }
        button { background: #ffcf4a; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        hr { border-color: #4f7840; margin: 15px 0; }
        .message { background: #2a6b2a; padding: 10px; border-radius: 30px; text-align: center; margin-top: 15px; display: none; }
        .error-message { background: #8b3a3a; }
        .logout-btn { background: #8b5a2b; color: white; }
        .empty-market { text-align: center; padding: 20px; color: #c5e0b4; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        // بيانات الجلسة (من localStorage)
        let session = null;
        let player = null;
        
        // تصنيف المنتجات
        const categories = {
            'خضار': ['Wheat', 'Tomato', 'Carrot', 'Potato', 'Pepper', 'Cucumber', 'Onion', 'Corn'],
            'فواكه': ['Strawberry', 'Watermelon'],
            'حيواني': ['Egg', 'Milk', 'Wool'],
            'مصنع': ['Bread', 'Pizza', 'Cake']
        };
        
        function getItemCategory(item) {
            for (let [cat, items] of Object.entries(categories)) {
                if (items.includes(item)) return cat;
            }
            return 'أخرى';
        }
        
        function loadSession() {
            const saved = localStorage.getItem('farmSession');
            if (!saved) { window.location.href = 'index.html'; return null; }
            try {
                const data = JSON.parse(saved);
                if (Date.now() - data.loginTime > 86400000) { localStorage.removeItem('farmSession'); window.location.href = 'index.html'; return null; }
                return data;
            } catch(e) { window.location.href = 'index.html'; return null; }
        }
        
        function loadGame() {
            if (session.isGuest) {
                const guestGame = localStorage.getItem('guestGame');
                if (guestGame) player = JSON.parse(guestGame);
                else player = { gold: 100, score: 0, inventory: { Wheat: 3, Carrot: 2 } };
            } else {
                const saved = localStorage.getItem('game_' + session.username);
                if (saved) player = JSON.parse(saved);
                else player = { gold: 100, score: 0, inventory: { Wheat: 3, Carrot: 2 }, fields: [], animals: [] };
            }
            if (!player.inventory) player.inventory = {};
            if (!player.gold) player.gold = 100;
        }
        
        function saveGame() {
            if (session.isGuest) localStorage.setItem('guestGame', JSON.stringify(player));
            else localStorage.setItem('game_' + session.username, JSON.stringify(player));
        }
        
        function showMessage(msg, isError = false) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = msg;
            msgDiv.className = isError ? 'message error-message' : 'message';
            msgDiv.style.display = 'block';
            setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
        }
        
        // تحميل الإعلانات (نموذج داخلي بدون سيرفر)
        function loadMarketListings() {
            const allListings = localStorage.getItem('globalMarketListings');
            let listings = allListings ? JSON.parse(allListings) : [];
            // فقط الإعلانات النشطة
            listings = listings.filter(l => l.status === 'active');
            listings.sort((a,b) => b.listedAt - a.listedAt);
            return listings;
        }
        
        function saveMarketListings(listings) {
            localStorage.setItem('globalMarketListings', JSON.stringify(listings));
        }
        
        async function createListing(item, qty, price) {
            if (!player.inventory[item] || player.inventory[item] < qty) {
                showMessage(`⚠️ لا تملك ${qty} من ${item}`, true);
                return false;
            }
            player.inventory[item] -= qty;
            saveGame();
            const listings = loadMarketListings();
            listings.push({
                id: Date.now(),
                seller: session.username,
                item_name: item,
                quantity: qty,
                price_per_unit: price,
                listedAt: Date.now(),
                status: 'active'
            });
            saveMarketListings(listings);
            showMessage(`✅ تم نشر ${qty} ${item} للبيع`);
            renderMarket();
            return true;
        }
        
        async function buyListing(listingId, pricePerUnit, qty, itemName, sellerName) {
            const total = pricePerUnit * qty;
            if (player.gold < total) { showMessage(`⚠️ تحتاج ${total} ذهب`, true); return; }
            
            // لا يمكن شراء منتج اللاعب نفسه
            if (sellerName === session.username) { showMessage(`⚠️ لا يمكنك شراء منتجك الخاص`, true); return; }
            
            player.gold -= total;
            player.inventory[itemName] = (player.inventory[itemName] || 0) + qty;
            saveGame();
            
            // تحديث رصيد البائع (إذا كان لاعب حقيقي وليس زائر)
            if (!session.isGuest && sellerName !== 'زائر') {
                const sellerGame = localStorage.getItem('game_' + sellerName);
                if (sellerGame) {
                    let sellerData = JSON.parse(sellerGame);
                    sellerData.gold += total;
                    localStorage.setItem('game_' + sellerName, JSON.stringify(sellerData));
                }
            }
            
            // حذف الإعلان
            const listings = loadMarketListings();
            const newListings = listings.filter(l => l.id !== listingId);
            saveMarketListings(newListings);
            
            showMessage(`🛒 اشتريت ${qty} ${itemName} بـ ${total} ذهب`);
            renderMarket();
        }
        
        function logout() {
            localStorage.removeItem('farmSession');
            window.location.href = 'index.html';
        }
        
        function renderMarket() {
            const listings = loadMarketListings();
            
            // تجميع الإعلانات حسب التصنيف
            let grouped = { 'خضار': [], 'فواكه': [], 'حيواني': [], 'مصنع': [], 'أخرى': [] };
            for (let l of listings) {
                let cat = getItemCategory(l.item_name);
                grouped[cat].push(l);
            }
            
            let marketHtml = '';
            for (let [cat, items] of Object.entries(grouped)) {
                if (items.length === 0) continue;
                marketHtml += `<div class="category-section"><div class="category-title">📂 ${cat}</div>`;
                for (let l of items) {
                    marketHtml += `
                        <div class="listing-card">
                            <span>📦 ${l.item_name} x${l.quantity}</span>
                            <span>💰 ${l.price_per_unit} ذهب</span>
                            <span>👤 ${l.seller}</span>
                            <button onclick="window.buyListing(${l.id}, ${l.price_per_unit}, ${l.quantity}, '${l.item_name}', '${l.seller}')">🛒 شراء</button>
                        </div>
                    `;
                }
                marketHtml += `</div>`;
            }
            if (marketHtml === '') marketHtml = '<div class="empty-market">🛒 لا توجد إعلانات. كن أول من ينشر!</div>';
            
            // خيارات المنتجات من مخزون اللاعب
            let itemOptions = '<option value="">-- اختر منتج --</option>';
            for (let [item, qty] of Object.entries(player.inventory)) {
                if (qty > 0) itemOptions += `<option value="${item}">${item} (${qty})</option>`;
            }
            
            document.getElementById('app').innerHTML = `
                <div class="market-container">
                    <div class="header">
                        <div class="gold">💰 ${player.gold} ذهب</div>
                        <div>👤 ${session.username}</div>
                        <div class="nav-buttons">
                            <a href="dashboard.html" class="nav-btn">🏠 الرئيسية</a>
                            <a href="store.html" class="nav-btn">🏪 المتجر</a>
                            <button class="logout-btn" id="logoutBtn">🚪 خروج</button>
                        </div>
                    </div>
                    <div class="content">
                        <h2>🛒 السوق المشترك</h2>
                        ${marketHtml}
                        <div class="create-listing">
                            <h3>➕ نشر إعلان جديد</h3>
                            <select id="itemSelect">${itemOptions}</select>
                            <input type="number" id="qtyInput" placeholder="الكمية" min="1">
                            <input type="number" id="priceInput" placeholder="السعر لكل وحدة" min="1">
                            <button id="publishBtn">📢 نشر للبيع</button>
                        </div>
                        <div id="message" class="message"></div>
                    </div>
                </div>
            `;
            
            document.getElementById('publishBtn').onclick = () => {
                const item = document.getElementById('itemSelect').value;
                const qty = parseInt(document.getElementById('qtyInput').value);
                const price = parseInt(document.getElementById('priceInput').value);
                if (!item || !qty || !price) { showMessage('املأ جميع الحقول', true); return; }
                createListing(item, qty, price);
            };
            document.getElementById('logoutBtn').onclick = logout;
        }
        
        session = loadSession();
        if (session) {
            loadGame();
            renderMarket();
        }
        
        window.buyListing = buyListing;
        window.createListing = createListing;
    </script>
</body>
</html>
