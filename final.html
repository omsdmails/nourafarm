<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>المزرعة المشتركة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1e3c2c; font-family: system-ui; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #app { max-width: 550px; width: 100%; background: #2e4a2e; border-radius: 30px; padding: 20px; color: white; }
        button, input { width: 100%; padding: 12px; margin: 6px 0; border-radius: 40px; border: none; font-size: 14px; }
        button { background: #ffcf4a; font-weight: bold; cursor: pointer; }
        .card { background: #1f3b1a; border-radius: 25px; padding: 18px; margin-bottom: 15px; }
        .error { background: #8b3a3a; padding: 10px; border-radius: 25px; color: #ffc0c0; text-align: center; }
        .success { background: #2a6b2a; padding: 10px; border-radius: 25px; text-align: center; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        .listing { background: #2c5e2a; border-radius: 20px; padding: 12px; margin: 10px 0; }
        hr { border-color: #4f7840; margin: 12px 0; }
    </style>
</head>
<body>
    <div id="app">⏳ جاري التحميل...</div>
    <script>
        const SUPABASE_URL = 'https://kzheikbpxicoeohapfjb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_aVm9aZ6W5vYTVvTxo3hucw__uZ06aId';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('msg');
            if (msgDiv) {
                msgDiv.innerHTML = `<div class="${type === 'error' ? 'error' : 'success'}">${msg}</div>`;
                setTimeout(() => { if (msgDiv.innerHTML.includes(msg)) msgDiv.innerHTML = ''; }, 3000);
            } else alert(msg);
        }
        
        async function ensureProfile() {
            const { data, error } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
            if (error && error.code !== 'PGRST116') throw error;
            if (data) return data;
            const newProfile = {
                id: currentUser.id,
                username: currentUser.email.split('@')[0],
                gold: 100,
                score: 0,
                inventory: { Wheat: 3, Tomato: 1 }
            };
            await supabase.from('profiles').insert(newProfile);
            return newProfile;
        }
        
        async function renderGame() {
            const profile = await ensureProfile();
            const { data: listings } = await supabase.from('market_listings').select('*, seller:profiles(username)').eq('status', 'active').order('listed_at', { ascending: false });
            
            // بناء المخزون
            let invButtons = '';
            for (let [item, qty] of Object.entries(profile.inventory)) {
                const price = item === 'Wheat' ? 5 : (item === 'Tomato' ? 8 : 4);
                invButtons += `<button class="sellBtn" data-item="${item}" data-price="${price}">بيع ${item} (${qty}) بـ ${price} ذهب</button>`;
            }
            if (invButtons === '') invButtons = '<p>مخزنك فارغ</p>';
            
            // بناء السوق
            let marketHtml = '';
            if (listings && listings.length > 0) {
                for (let l of listings) {
                    marketHtml += `
                        <div class="listing">
                            <div class="flex">
                                <span>${l.item_name} x${l.quantity}</span>
                                <span>💰 ${l.price_per_unit}</span>
                                <span>👤 ${l.seller?.username || 'بائع'}</span>
                                <button class="buyBtn" data-id="${l.id}" data-price="${l.price_per_unit}" data-qty="${l.quantity}" data-item="${l.item_name}" style="width:auto;">شراء</button>
                            </div>
                        </div>
                    `;
                }
            } else {
                marketHtml = '<p>لا توجد إعلانات حالياً</p>';
            }
            
            // خيارات الإعلان الجديد
            let itemOptions = '';
            for (let item of Object.keys(profile.inventory)) {
                itemOptions += `<option value="${item}">${item}</option>`;
            }
            
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <div class="flex">
                        <span>💰 ${profile.gold} ذهب</span>
                        <span>⭐ ${profile.score || 0}</span>
                        <span>👤 ${profile.username}</span>
                        <button id="logoutBtn" style="width:auto; background:#8b5a2b;">🚪 خروج</button>
                    </div>
                    <hr>
                    <div>
                        <h3>📦 مخزني</h3>
                        ${invButtons}
                    </div>
                    <hr>
                    <div>
                        <h3>🛒 السوق المشترك</h3>
                        ${marketHtml}
                    </div>
                    <hr>
                    <div>
                        <h4>➕ نشر إعلان جديد</h4>
                        <select id="itemSelect">${itemOptions}</select>
                        <input type="number" id="qtyInput" placeholder="الكمية">
                        <input type="number" id="priceInput" placeholder="السعر لكل وحدة">
                        <button id="publishBtn">📢 نشر الإعلان</button>
                    </div>
                    <div id="msg"></div>
                </div>
            `;
            
            // بيع مباشر
            document.querySelectorAll('.sellBtn').forEach(btn => {
                btn.onclick = async () => {
                    const item = btn.dataset.item;
                    const price = parseInt(btn.dataset.price);
                    const { data: p } = await supabase.from('profiles').select('gold, inventory').eq('id', currentUser.id).single();
                    if (p.inventory[item] <= 0) return;
                    const newInv = { ...p.inventory };
                    newInv[item]--;
                    const newGold = p.gold + price;
                    await supabase.from('profiles').update({ gold: newGold, inventory: newInv }).eq('id', currentUser.id);
                    renderGame();
                    showMessage(`بعت ${item} بـ ${price} ذهب`, 'success');
                };
            });
            
            // شراء من السوق
            document.querySelectorAll('.buyBtn').forEach(btn => {
                btn.onclick = async () => {
                    const listingId = btn.dataset.id;
                    const pricePerUnit = parseInt(btn.dataset.price);
                    const qty = parseInt(btn.dataset.qty);
                    const itemName = btn.dataset.item;
                    const total = pricePerUnit * qty;
                    
                    const buyer = await supabase.from('profiles').select('gold, inventory').eq('id', currentUser.id).single();
                    if (buyer.data.gold < total) { showMessage('ذهب غير كاف', 'error'); return; }
                    
                    // شراء الإعلان
                    const { data: listing } = await supabase.from('market_listings').select('seller_id').eq('id', listingId).single();
                    if (!listing) return;
                    
                    // تحديث المشتري
                    const newBuyerGold = buyer.data.gold - total;
                    const newBuyerInv = { ...buyer.data.inventory };
                    newBuyerInv[itemName] = (newBuyerInv[itemName] || 0) + qty;
                    await supabase.from('profiles').update({ gold: newBuyerGold, inventory: newBuyerInv }).eq('id', currentUser.id);
                    
                    // تحديث البائع
                    const seller = await supabase.from('profiles').select('gold').eq('id', listing.seller_id).single();
                    if (seller.data) {
                        await supabase.from('profiles').update({ gold: seller.data.gold + total }).eq('id', listing.seller_id);
                    }
                    
                    // حذف الإعلان (أو تحديث حالته)
                    await supabase.from('market_listings').update({ status: 'sold' }).eq('id', listingId);
                    
                    renderGame();
                    showMessage(`اشتريت ${qty} ${itemName} بـ ${total} ذهب`, 'success');
                };
            });
            
            // نشر إعلان جديد
            document.getElementById('publishBtn').onclick = async () => {
                const item = document.getElementById('itemSelect').value;
                const qty = parseInt(document.getElementById('qtyInput').value);
                const price = parseInt(document.getElementById('priceInput').value);
                if (!qty || !price) { showMessage('املأ الكمية والسعر', 'error'); return; }
                const { data: p } = await supabase.from('profiles').select('inventory').eq('id', currentUser.id).single();
                if (!p.inventory[item] || p.inventory[item] < qty) { showMessage('لا تملك الكمية الكافية', 'error'); return; }
                const newInv = { ...p.inventory };
                newInv[item] -= qty;
                await supabase.from('profiles').update({ inventory: newInv }).eq('id', currentUser.id);
                await supabase.from('market_listings').insert({ seller_id: currentUser.id, item_name: item, quantity: qty, price_per_unit: price });
                renderGame();
                showMessage(`تم نشر ${qty} ${item} للبيع`, 'success');
            };
            
            document.getElementById('logoutBtn').onclick = () => { supabase.auth.signOut(); location.reload(); };
        }
        
        async function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <h2>🌾 منصة المزارعين</h2>
                    <input type="email" id="email" placeholder="البريد الإلكتروني">
                    <input type="password" id="password" placeholder="كلمة المرور">
                    <button id="loginBtn">دخول</button>
                    <button id="signupBtn">حساب جديد</button>
                    <div id="msg"></div>
                </div>
            `;
            document.getElementById('loginBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
                if (error) document.getElementById('msg').innerHTML = `<div class="error">${error.message}</div>`;
                else start();
            };
            document.getElementById('signupBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                const { error } = await supabase.auth.signUp({ email, password: pass });
                if (error) document.getElementById('msg').innerHTML = `<div class="error">${error.message}</div>`;
                else document.getElementById('msg').innerHTML = '<div class="success">تم التسجيل! سجل الدخول الآن.</div>';
            };
        }
        
        async function start() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser();
                if (error || !user) {
                    renderLogin();
                } else {
                    currentUser = user;
                    await renderGame();
                }
            } catch(err) {
                document.getElementById('app').innerHTML = `<div class="card"><div class="error">⚠️ خطأ: ${err.message}</div></div>`;
            }
        }
        
        start();
    </script>
</body>
</html>
